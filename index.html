<style>

:root{--bg:#0f1117;--surface:#181c27;--card:#1e2334;--border:#2a3048;--accent:#4f8ef7;--accent2:#38d9a9;--warn:#f5a623;--danger:#e05c5c;--text:#e8ecf5;--muted:#6b7894;--label:#9ba8c4;--radius:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}
.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;}
.topbar-logo{font-size:16px;font-weight:800;color:var(--accent);}
.topbar-logo span{color:var(--accent2);}
.topbar-title{font-size:15px;font-weight:600;flex:1;text-align:center;}
.hamburger-btn{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px 8px;line-height:1;}
.content{padding:16px;padding-top:72px;padding-bottom:24px;max-width:600px;margin:0 auto;}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;}
.drawer-overlay.open{opacity:1;pointer-events:auto;}
.drawer{position:fixed;top:0;left:0;bottom:0;width:78%;max-width:300px;background:var(--surface);transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column;box-shadow:4px 0 20px rgba(0,0,0,.3);}
.drawer-overlay.open .drawer{transform:translateX(0);}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);}
.drawer-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 8px;}
.drawer-items{display:flex;flex-direction:column;padding:8px;overflow-y:auto;}
.drawer-item{display:flex;align-items:center;gap:12px;padding:14px 12px;border:none;background:none;color:var(--text);font-size:15px;font-weight:500;cursor:pointer;border-radius:8px;text-align:left;width:100%;transition:background .15s;}
.drawer-item:active,.drawer-item.active{background:rgba(255,255,255,.06);color:var(--accent);}
.drawer-item .nav-icon{font-size:18px;width:22px;text-align:center;}
.big-btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.big-btn{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s;width:100%;}
.big-btn:active{border-color:var(--accent);}
.big-btn .big-icon{font-size:36px;}
.big-btn .big-label{font-size:15px;font-weight:700;}
.big-btn.primary{border-color:rgba(79,142,247,.4);background:rgba(79,142,247,.08);}
.big-btn.success{border-color:rgba(56,217,169,.4);background:rgba(56,217,169,.08);}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:14px;font-weight:700;}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(42,48,72,.5);font-size:13px;cursor:pointer;}
.list-item:last-child{border-bottom:none;}
.list-item-left{display:flex;flex-direction:column;gap:3px;}
.list-item-title{font-weight:600;}
.list-item-sub{font-size:12px;color:var(--muted);}
.list-item-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;}
.badge-green{background:rgba(56,217,169,.15);color:var(--accent2);}
.badge-warn{background:rgba(245,166,35,.15);color:var(--warn);}
.badge-danger{background:rgba(224,92,92,.15);color:var(--danger);}
.badge-blue{background:rgba(79,142,247,.15);color:var(--accent);}
.badge-gray{background:rgba(107,120,148,.15);color:var(--label);}
.badge-purple{background:rgba(160,120,247,.15);color:#a078f7;}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.form-label{font-size:12px;color:var(--label);font-weight:600;}

.form-input:focus,.form-select:focus{border-color:var(--accent);}
.form-select option{background:var(--surface);}
.searchsel{position:relative;}
.searchsel-input{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:11px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;width:100%;transition:border-color .15s;}
.searchsel-input:focus{border-color:var(--accent);}
.searchsel-list{position:absolute;top:calc(100% + 4px);left:0;right:0;max-height:220px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:7px;z-index:50;display:none;box-shadow:0 6px 16px rgba(0,0,0,.35);}

.dyn-row .dyn-remove{background:none;border:none;color:var(--danger);font-size:20px;cursor:pointer;padding:4px;flex-shrink:0;}
.btn{padding:12px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;transition:opacity .15s;}
.btn:active{opacity:.8;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-success{background:var(--accent2);color:#0f1117;}
.btn-ghost{background:var(--card);color:var(--label);border:1px solid var(--border);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-sm{padding:8px 14px;font-size:13px;}
.btn-row{display:flex;gap:10px;}
.btn-row .btn{flex:1;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-height:92vh;overflow-y:auto;animation:slideUp .25s;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:700;margin-bottom:20px;padding-right:32px;}
.modal-close{position:absolute;right:20px;top:20px;background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1;}
.modal-inner{position:relative;}
.toast-wrap{position:fixed;top:70px;left:16px;right:16px;z-index:300;pointer-events:none;}
.toast{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;animation:slideDown .25s;margin-bottom:8px;pointer-events:all;}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.toast.success{border-color:rgba(56,217,169,.4);}
.toast.error{border-color:rgba(224,92,92,.4);}
.toast.warn{border-color:rgba(245,166,35,.4);}
.section-title{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;margin-top:4px;}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
.precio-preview{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:14px;}
.precio-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;}
.precio-row.total{font-weight:700;color:var(--accent2);border-top:1px solid var(--border);padding-top:8px;margin-top:4px;font-size:15px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.pct-bar{height:4px;border-radius:2px;background:var(--border);margin-top:4px;overflow:hidden;}
.pct-fill{height:100%;border-radius:2px;}
</style>
</head>

<script>
const {createClient}=supabase
const sb=createClient('https://uqpsmzesmwnaubisuwlx.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxcHNtemVzbXduYXViaXN1d2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5OTk1NzQsImV4cCI6MjA5NjU3NTU3NH0.3DtDxAfknBX9TDvgcu2IxFWyf1Se5RF0vZDuuHaJeZg')

// ── CACHE LOCAL ───────────────────────────────────────────
const cache = {}
const CACHE_TTL = 60000 // 1 minuto
function cacheGet(key) {
  const c = cache[key]
  if (!c) return null
  if (Date.now() - c.ts > CACHE_TTL) { delete cache[key]; return null }
  return c.data
}
function cacheSet(key, data) { cache[key] = { data, ts: Date.now() } }
function cacheInvalidate(...keys) { keys.forEach(k => { if(k) delete cache[k]; else Object.keys(cache).forEach(k2=>delete cache[k2]) }) }

// ── OFFLINE QUEUE ─────────────────────────────────────────
const QUEUE_KEY = 'qa_offline_queue'
function queueGet() { try { return JSON.parse(localStorage.getItem(QUEUE_KEY)||'[]') } catch(e) { return [] } }
function queueSave(q) { try { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)) } catch(e) {} }
async function queueAdd(op) {
  const q = queueGet(); q.push({...op, id: Date.now(), ts: new Date().toISOString()}); queueSave(q)
}
async function queueFlush() {
  if (!navigator.onLine) return
  const q = queueGet(); if (!q.length) return
  const failed = []
  for (const op of q) {
    try {
      if (op.type === 'insert') await sb.from(op.table).insert(op.data)
      else if (op.type === 'update') await sb.from(op.table).update(op.data).eq('id', op.id_val)
      else if (op.type === 'upsert') await sb.from(op.table).upsert(op.data)
    } catch(e) { failed.push(op) }
  }
  queueSave(failed)
  if (failed.length < q.length) { cacheInvalidate(); toast('success', 'Sincronizado con la nube ✅') }
}
window.addEventListener('online', () => { queueFlush(); toast('info', 'Conexion restaurada') })
window.addEventListener('offline', () => toast('warn', 'Sin conexion — cambios guardados localmente'))

// ── SKELETON ──────────────────────────────────────────────
function skeleton(n=4) {
  return '<div class="card">' + Array(n).fill(0).map(()=>
    '<div class="list-item" style="cursor:default">' +
    '<div class="list-item-left">' +
    '<div style="height:14px;width:140px;background:var(--border);border-radius:4px;margin-bottom:6px"></div>' +
    '<div style="height:11px;width:90px;background:var(--border);border-radius:4px;opacity:.6"></div>' +
    '</div>' +
    '<div style="height:22px;width:50px;background:var(--border);border-radius:4px"></div>' +
    '</div>'
  ).join('') + '</div>'
}

// ── DB HELPER: online/offline ─────────────────────────────
async function dbInsert(table, data) {
  if (navigator.onLine) {
    const {error} = await sb.from(table).insert(data)
    if (error) throw error
  } else {
    await queueAdd({type:'insert', table, data})
  }
  cacheInvalidate(table)
}
async function dbUpdate(table, data, id) {
  if (navigator.onLine) {
    const {error} = await sb.from(table).update(data).eq('id', id)
    if (error) throw error
  } else {
    await queueAdd({type:'update', table, data, id_val: id})
  }
  cacheInvalidate(table)
}
async function dbUpsertStock(table, id, newStock, extraFields={}) {
  const data = {stock: newStock, ...extraFields}
  if (navigator.onLine) {
    await sb.from(table).update(data).eq('id', id)
  } else {
    await queueAdd({type:'update', table, data, id_val: id})
  }
  cacheInvalidate(table)
}

function v(id){return document.getElementById(id)?.value?.trim()||''}
function n(id){return parseFloat(document.getElementById(id)?.value)||0}
function esIlimitado(i){return !i.stock_minimo&&!i.stock&&!i.ppu}
function estadoInsumo(s,vol){const p=vol>0?(s/vol)*100:100;if(p>=50)return['green','Normal',p];if(p>=30)return['warn','Medio',p];if(p>=10)return['danger','Bajo',p];return['danger','Critico',p]}
const titulos={dashboard:'Dashboard',insumos:'Insumos',formulas:'Formulas',ventas:'Ventas',compras:'Compras',inventario:'Inventario',clientes:'Clientes',reportes:'Reportes',mas:'Menu'}
let _paginaActual='dashboard'
window.navegar=function(p){_paginaActual=p;document.querySelectorAll('.drawer-item').forEach(b=>b.classList.toggle('active',b.dataset.page===p));document.getElementById('page-title').textContent=titulos[p]||p;cerrarDrawer();renderPagina(p)}
window.abrirDrawer=function(){document.getElementById('drawer-overlay').classList.add('open')}
window.cerrarDrawer=function(e){if(!e||e.target===document.getElementById('drawer-overlay'))document.getElementById('drawer-overlay').classList.remove('open')}
const FORMULAS_PASS='quimarts2026'
window.navegarFormulas=function(){
  if(sessionStorage.getItem('formulasUnlocked')==='1'){navegar('formulas');return}
  cerrarDrawer()
  abrirModal(`
    <button class="modal-close" onclick="cerrarModal()">✕</button>
    <div class="modal-title">🔒 Fórmulas protegidas</div>
    <div class="form-group"><label class="form-label">Contraseña</label>
      <input class="form-input" id="formulas-pass" type="password" placeholder="Ingresá la contraseña" onkeydown="if(event.key==='Enter')validarPassFormulas()"></div>
    <button class="btn btn-primary" onclick="validarPassFormulas()">Ingresar</button>
  `)
  setTimeout(()=>document.getElementById('formulas-pass')?.focus(),100)
}
window.validarPassFormulas=function(){
  const val=document.getElementById('formulas-pass').value
  if(val===FORMULAS_PASS){
    sessionStorage.setItem('formulasUnlocked','1')
    cerrarModal()
    navegar('formulas')
  }else{
    toast('error','Contraseña incorrecta')
  }
}
async function renderPagina(p){document.getElementById('content').innerHTML=skeleton(3);const map={dashboard:renderDashboard,insumos:renderInsumos,formulas:renderFormulas,ventas:renderVentas,compras:renderCompras,inventario:renderInventario,clientes:renderClientes,reportes:renderReportes,mas:renderMas};if(map[p])await map[p]();else document.getElementById('content').innerHTML='<div class="loading">Proximamente</div>'}

async function renderDashboard(){
  const [{data:ins},{data:prods},{data:vendeuda}]=await Promise.all([
    sb.from('insumos').select('id,stock,stock_minimo,nombre,ppu').eq('activo',true),
    sb.from('productos').select('stock,stock_minimo,nombre').eq('activo',true),
    sb.from('ventas').select('id,cliente_libre,saldo_pendiente,clientes(nombre,apellido)').eq('estado_pago','debe')
  ])
  const insConVol=ins?.filter(i=>!esIlimitado(i)&&i.stock_minimo>0)||[]
  const insCrit=insConVol.filter(i=>(i.stock/i.stock_minimo)*100<10)
  const insBaj=insConVol.filter(i=>{const p=(i.stock/i.stock_minimo)*100;return p>=10&&p<30})
  const insMed=insConVol.filter(i=>{const p=(i.stock/i.stock_minimo)*100;return p>=30&&p<50})
  const pCrit=prods?.filter(p=>p.stock===0)||[]
  const pBaj=prods?.filter(p=>p.stock_minimo>0&&p.stock>0&&p.stock<=p.stock_minimo)||[]
  const tot=insCrit.length+insBaj.length+insMed.length+pCrit.length+pBaj.length+(vendeuda?.length||0)
  document.getElementById('content').innerHTML=`
    <div class="big-btn-grid">
      <button class="big-btn primary" onclick="navegar('ventas')"><div class="big-icon">💰</div><div class="big-label">Vender</div></button>
      <button class="big-btn success" onclick="navegar('inventario')"><div class="big-icon">📦</div><div class="big-label">Inventario</div></button>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">🔔 Alertas</span>${tot>0?`<span class="badge badge-danger">${tot}</span>`:'<span class="badge badge-green">Todo OK</span>'}</div>
      ${tot===0?'<div class="loading" style="padding:20px">Sin alertas por ahora 👍</div>':''}
      ${insCrit.length?`<div style="padding:10px 16px 4px;font-size:11px;color:var(--danger);font-weight:700;text-transform:uppercase">🔴 Insumos criticos (&lt;10%)</div>${insCrit.map(i=>`<div class="list-item" onclick="navegar('insumos')"><div class="list-item-left"><div class="list-item-title">${i.nombre}</div><div class="list-item-sub">${i.stock} u · ${Math.round((i.stock/i.stock_minimo)*100)}%</div></div><span class="badge badge-danger">Critico</span></div>`).join('')}`:''}
      ${insBaj.length?`<div style="padding:10px 16px 4px;font-size:11px;color:var(--danger);font-weight:700;text-transform:uppercase">🟠 Insumos bajos (10-29%)</div>${insBaj.map(i=>`<div class="list-item" onclick="navegar('insumos')"><div class="list-item-left"><div class="list-item-title">${i.nombre}</div><div class="list-item-sub">${i.stock} u · ${Math.round((i.stock/i.stock_minimo)*100)}%</div></div><span class="badge badge-danger">Bajo</span></div>`).join('')}`:''}
      ${insMed.length?`<div style="padding:10px 16px 4px;font-size:11px;color:var(--warn);font-weight:700;text-transform:uppercase">🟡 Insumos medios (30-49%)</div>${insMed.map(i=>`<div class="list-item" onclick="navegar('insumos')"><div class="list-item-left"><div class="list-item-title">${i.nombre}</div><div class="list-item-sub">${i.stock} u · ${Math.round((i.stock/i.stock_minimo)*100)}%</div></div><span class="badge badge-warn">Medio</span></div>`).join('')}`:''}

window.calcFormula=function(comps,rend){
  const cant=parseFloat(document.getElementById('calc-cant').value)||0
  const factor=cant/rend
  const insuf=comps.filter(c=>!esIlimitado(c.insumos)&&c.insumos.stock<c.cantidad*factor)
  document.getElementById('calc-res').innerHTML='<div class="card">'+comps.map(c=>{const nec=(c.cantidad*factor).toFixed(2);const pct=((c.cantidad/rend)*100).toFixed(1);const inf=esIlimitado(c.insumos);const ok=inf||c.insumos.stock>=c.cantidad*factor;return'<div class="list-item" style="cursor:default"><div class="list-item-left"><div class="list-item-title">'+c.insumos.nombre+' <span style="color:var(--muted);font-weight:400">('+pct+'%)</span></div><div class="list-item-sub" style="color:'+(ok?'var(--accent2)':'var(--danger)')+'>'+(inf?'Ilimitado — no descuenta stock':'Stock: '+c.insumos.stock+' u')+'</div></div><span style="font-weight:700">'+nec+' u</span></div>'}).join('')+'</div>'+(insuf.length?'<div style="background:rgba(224,92,92,.1);border:1px solid rgba(224,92,92,.3);border-radius:8px;padding:12px;margin-top:8px;font-size:13px;color:var(--danger)">⚠️ Stock insuficiente: '+insuf.map(c=>c.insumos.nombre).join(', ')+'</div>':'')
}
window.producirFormula=async function(fId,fNom,comps,rend){
  const cant=parseFloat(document.getElementById('calc-cant').value)||0
  if(!cant){toast('error','Ingresa una cantidad');return}
  const factor=cant/rend
  for(const c of comps){if(!esIlimitado(c.insumos)&&c.insumos.stock<c.cantidad*factor){toast('error','Stock insuficiente: '+c.insumos.nombre);return}}
  // calcular PPG/U de la formula = costo total ingredientes / unidades producidas
  let costoTotal=0
  for(const c of comps){
    if(!esIlimitado(c.insumos)){
      costoTotal+=c.cantidad*factor*c.insumos.ppu
      await sb.from('insumos').update({stock:c.insumos.stock-c.cantidad*factor}).eq('id',c.insumos.id)
    }
  }
  const ppuFormula=cant>0?Number((costoTotal/cant).toFixed(2)):0
  const {data:existe}=await sb.from('insumos').select('id,stock').eq('nombre',fNom).eq('tipo','formula').maybeSingle()
  if(existe){
    await sb.from('insumos').update({stock:existe.stock+cant,ppu:ppuFormula,stock_minimo:existe.stock+cant}).eq('id',existe.id)
  }else{
    await sb.from('insumos').insert({nombre:fNom,tipo:'formula',stock:cant,ppu:ppuFormula,stock_minimo:cant,activo:true})
  }
  await sb.from('producciones_formula').insert({formula_id:fId,cantidad:cant})
  toast('success',cant+' u de "'+fNom+'" producidas · PPG/U: $'+ppuFormula.toFixed(2)+' ✅')
  cerrarModal();renderFormulas()
}

window.filtrarSearchsel=function(prefix){
  const q=(document.getElementById(prefix+'-search').value||'').toLowerCase()
  const opts=(window._insumosCache||[]).filter(i=>i.nombre.toLowerCase().includes(q))
  const list=document.getElementById(prefix+'-list')
  list.innerHTML=opts.length?opts.map(i=>'<div class="searchsel-opt" onclick="seleccionarSearchsel(\''+prefix+'\',\''+i.id+'\',\''+i.nombre.replace(/'/g,"\\'")+'\')">'+i.nombre+'</div>').join(''):'<div class="searchsel-empty">Sin resultados</div>'
  list.classList.add('open')
}
window.abrirSearchsel=function(prefix){filtrarSearchsel(prefix)}
window.seleccionarSearchsel=function(prefix,id,nombre){
  document.getElementById(prefix).value=id
  document.getElementById(prefix+'-search').value=nombre
  document.getElementById(prefix+'-list').classList.remove('open')
  recalcProd()
}
function cerrarSearchselFuera(e){
  document.querySelectorAll('.searchsel').forEach(w=>{if(!w.contains(e.target))w.querySelector('.searchsel-list')?.classList.remove('open')})
}

window.recalcProd=function(){
  const ins=window._insumosCache||[]
  const insId=document.getElementById('p-ins')?.value
  const cins=parseFloat(document.getElementById('p-cins')?.value)||0
  const mo=parseFloat(document.getElementById('p-mo')?.value)||0
  const gan=parseFloat(document.getElementById('p-gan')?.value)||0
  const envp=parseFloat(document.getElementById('p-envp')?.value)||0
  const insumo=ins.find(i=>i.id===insId)
  if(!insumo||!cins){document.getElementById('p-pprev').innerHTML='';return}
  const cb=insumo.ppu*cins
  const eS=document.getElementById('p-env'),tS=document.getElementById('p-etiq')
  const ppE=eS?.value?parseFloat(eS.options[eS.selectedIndex].dataset.ppu)||0:0
  const ppT=tS?.value?parseFloat(tS.options[tS.selectedIndex].dataset.ppu)||0:0
  // Otros 1/2/3: selects opcionales, cada uno suma su propio costo
  const getOtroPP=id=>{const s=document.getElementById(id);return s?.value?parseFloat(s.options[s.selectedIndex].dataset.ppu)||0:0}
  const ppO1=getOtroPP('p-otro1'),ppO2=getOtroPP('p-otro2'),ppO3=getOtroPP('p-otro3')
  const moMonto=cb*(mo/100)
  const ganMonto=cb*(gan/100)
  const baseEnvasado=cb+moMonto+ganMonto
  const envpMonto=baseEnvasado*(envp/100)
  const sug=baseEnvasado+envpMonto+ppE+ppT+ppO1+ppO2+ppO3
  window._costo=cb;window._sugerido=sug
  document.getElementById('p-pprev').innerHTML=`<div class="precio-preview">
    <div class="precio-row"><span>Costo base</span><span>$${cb.toFixed(2)}</span></div>
    <div class="precio-row"><span>Mano de obra (producción)</span><span>$${moMonto.toFixed(2)}</span></div>
    <div class="precio-row"><span>Ganancia</span><span>$${ganMonto.toFixed(2)}</span></div>
    <div class="precio-row"><span>Mano de obra (envasado)</span><span>$${envpMonto.toFixed(2)}</span></div>
    <div class="precio-row"><span>Envase</span><span>$${ppE.toFixed(2)}</span></div>
    <div class="precio-row"><span>Etiqueta</span><span>$${ppT.toFixed(2)}</span></div>
    ${ppO1?`<div class="precio-row"><span>Otros 1</span><span>$${ppO1.toFixed(2)}</span></div>`:''}
    ${ppO2?`<div class="precio-row"><span>Otros 2</span><span>$${ppO2.toFixed(2)}</span></div>`:''}
    ${ppO3?`<div class="precio-row"><span>Otros 3</span><span>$${ppO3.toFixed(2)}</span></div>`:''}
    <div class="precio-row total"><span>Precio sugerido</span><span>$${sug.toFixed(2)}</span></div>
  </div>`
  if(!document.getElementById('p-pventa').value)document.getElementById('p-pventa').placeholder=sug.toFixed(2)
}
window.guardarProducto=async function(){
  const nom=v('p-nom');if(!nom){toast('error','El nombre es obligatorio');return}
  const {data:prod,error}=await sb.from('productos').insert({nombre:nom,insumo_id:v('p-ins')||null,cantidad_insumo:n('p-cins'),envase_id:v('p-env')||null,etiqueta_id:v('p-etiq')||null,otro1_id:v('p-otro1')||null,otro2_id:v('p-otro2')||null,otro3_id:v('p-otro3')||null,mo_pct:n('p-mo'),ganancia_pct:n('p-gan'),envasado_pct:n('p-envp'),costo:window._costo||0,precio_sugerido:window._sugerido||0,precio_venta:n('p-pventa')||window._sugerido||0,stock:n('p-stock'),stock_minimo:n('p-smin')}).select().single()
  if(error){toast('error','Error: '+error.message);return}
  // Guardar variedades
  const variedades=[]
  let vIdx=0
  while(document.getElementById(`var-nom-${vIdx}`)){
    const vn=document.getElementById(`var-nom-${vIdx}`).value
    const vs=parseFloat(document.getElementById(`var-stock-${vIdx}`).value)||0
    if(vn)variedades.push({producto_id:prod.id,nombre:vn,stock:vs})
    vIdx++
  }
  if(variedades.length)await sb.from('producto_variedades').insert(variedades)
  cacheInvalidate('productos');toast('success','Producto guardado ✅');cerrarModal();renderInventario()
}

window.producirProducto=async function(id,nom){
  const cant=n('pp-cant');if(!cant){toast('error','Ingresa una cantidad');return}
  const variedadId=document.getElementById('pp-variedad')?.value
  const {data:p}=await sb.from('productos').select('*,insumos(id,stock,nombre,stock_minimo,ppu)').eq('id',id).single()
  const nec=p.cantidad_insumo*cant
  if(p.insumos&&!esIlimitado(p.insumos)&&p.insumos.stock<nec){toast('error','Stock insuficiente: '+p.insumos.nombre+' (hay '+p.insumos.stock+' u, necesitas '+nec+')');return}
  if(p.insumo_id&&!esIlimitado(p.insumos))await sb.from('insumos').update({stock:p.insumos.stock-nec}).eq('id',p.insumo_id)
  if(variedadId){
    const {data:vr}=await sb.from('producto_variedades').select('stock').eq('id',variedadId).single()
    await sb.from('producto_variedades').update({stock:vr.stock+cant}).eq('id',variedadId)
  }else{
    await sb.from('productos').update({stock:p.stock+cant}).eq('id',id)
  }
  await sb.from('producciones_producto').insert({producto_id:id,cantidad:cant})
  toast('success',cant+' u de "'+nom+'" producidas ✅');cerrarModal();renderInventario()
}

window.calcPPU=function(){const c=parseFloat(document.getElementById('co-cant')?.value)||0;const m=parseFloat(document.getElementById('co-monto')?.value)||0;if(c&&m)document.getElementById('co-ppuprev').textContent='PPG/U calculado: $'+(m/c).toFixed(2)}
window.guardarCompra=async function(){
  const tipo=document.getElementById('co-tipo').value,met=document.getElementById('co-met').value,prov=v('co-prov')
  if(tipo==='insumo'){
    const insId=document.getElementById('co-ins').value,cant=n('co-cant'),monto=n('co-monto')
    if(!insId){toast('error','Selecciona un insumo');return}
    if(!cant||!monto){toast('error','Completa cantidad y monto');return}
    const ppuNuevo=Number((monto/cant).toFixed(2))
    const opt=document.getElementById('co-ins').options[document.getElementById('co-ins').selectedIndex]
    const stockAct=parseFloat(opt.dataset.stock)||0,ppuAnt=parseFloat(opt.dataset.ppu)||0
    await sb.from('insumos').update({stock:stockAct+cant,ppu:ppuNuevo,stock_minimo:cant}).eq('id',insId)
    await sb.from('compras').insert({tipo,insumo_id:insId,cantidad:cant,ppu_anterior:ppuAnt,ppu_nuevo:ppuNuevo,monto_total:monto,metodo_pago:met,proveedor:prov})
    toast('success','Stock actualizado · PPG/U: $'+ppuNuevo.toFixed(2)+' ✅')
  }else{
    const monto=n('co-monto-otro');if(!monto){toast('error','Ingresa el monto');return}
    await sb.from('compras').insert({tipo,categoria_otro:v('co-cat'),descripcion:v('co-desc'),monto_total:monto,metodo_pago:met,proveedor:prov})
    toast('success','Gasto registrado ✅')
  }
  cerrarModal();renderCompras()
}

window.toggleVentaTipo=function(prods,ins){const tipo=document.getElementById('vt-tipo').value;const items=tipo==='producto'?prods:ins;document.getElementById('vt-item').innerHTML=items?.map(i=>{const precio=tipo==='producto'?i.precio_venta:i.ppu;const nom=i.nombre;return'<option value="'+i.id+'" data-precio="'+precio+'" data-sug="'+(tipo==='producto'?i.precio_sugerido:precio)+'" data-nom="'+nom+'">'+nom+' — $'+Number(precio).toFixed(2)+'</option>'}).join('')||''}
window.toggleParcial=function(){document.getElementById('vt-parcial').style.display=document.getElementById('vt-est').value==='parcial'?'block':'none'}
window.addItemVenta=function(prods,ins){const sel=document.getElementById('vt-item');const opt=sel.options[sel.selectedIndex];if(!opt?.value){toast('error','Selecciona un item');return}const cant=parseFloat(document.getElementById('vt-cant').value)||1;const precioInput=parseFloat(document.getElementById('vt-precio').value);const precioSug=parseFloat(opt.dataset.sug)||0;const precioUnit=precioInput||parseFloat(opt.dataset.precio)||0;window._vitems.push({tipo:document.getElementById('vt-tipo').value,id:opt.value,nombre:opt.dataset.nom||opt.text,cant,precio_sugerido:precioSug,precio_unitario:precioUnit,subtotal:cant*precioUnit,diferencia:(precioUnit-precioSug)*cant});renderItemsVenta()}
function renderItemsVenta(){const items=window._vitems;const total=items.reduce((a,i)=>a+i.subtotal,0);document.getElementById('vt-items').innerHTML=items.length?'<div class="card" style="margin-bottom:12px">'+items.map((i,idx)=>'<div class="list-item" style="cursor:default"><div class="list-item-left"><div class="list-item-title">'+i.nombre+'</div><div class="list-item-sub">x'+i.cant+' · $'+Number(i.precio_unitario).toFixed(2)+'</div></div><div class="list-item-right"><span style="font-weight:700">$'+i.subtotal.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})+'</span><span onclick="window._vitems.splice('+idx+',1);renderItemsVenta()" style="color:var(--danger);cursor:pointer;font-size:12px">quitar</span></div></div>').join('')+'</div>':'';document.getElementById('vt-total').textContent=items.length?'Total: $'+total.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}):''}
window.cerrarVenta=async function(){
  const items=window._vitems;if(!items.length){toast('error','Agrega al menos un item');return}
  const total=items.reduce((a,i)=>a+i.subtotal,0)
  const est=document.getElementById('vt-est').value
  const mpagado=est==='pagado'?total:est==='parcial'?n('vt-mpagado'):0
  const cliId=document.getElementById('vt-cli').value||null,cliLibre=v('vt-cli-libre')
  const {data:vt,error}=await sb.from('ventas').insert({cliente_id:cliId,cliente_libre:!cliId?(cliLibre||'Consumidor Final'):null,total,subtotal:total,metodo_pago:document.getElementById('vt-met').value,estado_pago:est,monto_pagado:mpagado,saldo_pendiente:total-mpagado,notas:v('vt-notas')}).select().single()
  if(error){toast('error','Error al guardar venta');return}
  await sb.from('venta_items').insert(items.map(i=>({venta_id:vt.id,tipo:i.tipo,producto_id:i.tipo==='producto'?i.id:null,insumo_id:i.tipo==='insumo'?i.id:null,nombre_item:i.nombre,cantidad:i.cant,precio_sugerido:i.precio_sugerido,precio_unitario:i.precio_unitario,subtotal:i.subtotal,diferencia:i.diferencia})))
  for(const i of items){if(i.tipo==='producto'){const {data:p}=await sb.from('productos').select('stock').eq('id',i.id).single();await sb.from('productos').update({stock:Math.max(0,p.stock-i.cant)}).eq('id',i.id)}else{const {data:ins}=await sb.from('insumos').select('stock,stock_minimo,ppu').eq('id',i.id).single();if(!esIlimitado(ins))await sb.from('insumos').update({stock:Math.max(0,ins.stock-i.cant)}).eq('id',i.id)}}
  toast('success','Venta #'+String(vt.numero).padStart(4,'0')+' — $'+total.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})+' ✅')
  cerrarModal();setTimeout(()=>modalComprobante(vt.id),300)
}
window.modalComprobante=async function(id){
  const [{data:vt},{data:items}]=await Promise.all([sb.from('ventas').select('*,clientes(nombre,apellido,cuit_cuil,telefono)').eq('id',id).single(),sb.from('venta_items').select('*').eq('venta_id',id)])
  const cli=vt.clientes?vt.clientes.nombre+' '+(vt.clientes.apellido||''):(vt.cliente_libre||'Consumidor Final')
  const fecha=new Date(vt.created_at).toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'})
  const num=String(vt.numero).padStart(4,'0')
  const lineas=items.map(i=>'- '+i.nombre_item+' x'+i.cantidad+' - $'+Number(i.subtotal).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})).join('\n')
  const txt='*QuimArts - Comprobante #'+num+'*\nFecha: '+fecha+'\nCliente: '+cli+'\n\n'+lineas+'\n\n*Total: $'+Number(vt.total).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})+'*\nPago: '+vt.metodo_pago+' - '+vt.estado_pago+(vt.saldo_pendiente>0?'\nSaldo pendiente: $'+Number(vt.saldo_pendiente).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}):'')
  abrirModal(`<button class="modal-close" onclick="cerrarModal()">✕</button>
    <div class="modal-title">🧾 Comprobante #${num}</div>
    <div class="card" style="margin-bottom:14px">
      <div class="list-item" style="cursor:default"><span style="color:var(--muted)">Cliente</span><strong>${cli}</strong></div>
      <div class="list-item" style="cursor:default"><span style="color:var(--muted)">Fecha</span><span>${fecha}</span></div>
      <div class="list-item" style="cursor:default"><span style="color:var(--muted)">Pago</span><span>${vt.metodo_pago} · <span class="badge badge-${vt.estado_pago==='pagado'?'green':vt.estado_pago==='parcial'?'warn':'danger'}">${vt.estado_pago}</span></span></div>
      ${items.map(i=>'<div class="list-item" style="cursor:default"><span>'+i.nombre_item+' x'+i.cantidad+'</span><strong>$'+Number(i.subtotal).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})+'</strong></div>').join('')}
      <div class="list-item" style="cursor:default;border-top:1px solid var(--border)"><strong>Total</strong><strong style="color:var(--accent2);font-size:18px">$${Number(vt.total).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}</strong></div>
      ${vt.saldo_pendiente>0?'<div class="list-item" style="cursor:default"><span style="color:var(--danger)">Saldo pendiente</span><strong style="color:var(--danger)">$'+Number(vt.saldo_pendiente).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})+'</strong></div>':''}
    </div>
    <div class="btn-row">
      <button class="btn btn-success" onclick="window.open('https://wa.me/?text='+encodeURIComponent(waTxt),'_blank')">📱 WhatsApp</button>
      <button class="btn btn-primary" onclick="window.open('mailto:?subject=Comprobante QuimArts %23${num}&body='+encodeURIComponent(waTxt),'_blank')">📧 Mail</button>
    </div>`)
  window.waTxt=txt
}

async function renderClientes(){
  const c=document.getElementById('content');c.innerHTML=skeleton(4)
  let data=cacheGet('clientes')
  if(!data){const r=await sb.from('clientes').select('*').order('nombre');data=r.data;cacheSet('clientes',data)}
  document.getElementById('content').innerHTML=`<button class="btn btn-primary" style="margin-bottom:16px" onclick="modalNuevoCliente()">+ Nuevo cliente</button><div class="card">${!data?.length?'<div class="loading">Sin clientes</div>':data.map(c=>'<div class="list-item" style="cursor:default"><div class="list-item-left"><div class="list-item-title">'+(c.nombre||'')+' '+(c.apellido||'')+'</div><div class="list-item-sub">'+(c.telefono||'')+' '+(c.cuit_cuil?'· '+c.cuit_cuil:'')+'</div></div></div>').join('')}</div>`
}
window.modalNuevoCliente=function(){abrirModal(`<button class="modal-close" onclick="cerrarModal()">✕</button><div class="modal-title">👤 Nuevo cliente</div><div class="grid-2"><div class="form-group"><label class="form-label">Nombre</label><input class="form-input" id="cl-nom"></div><div class="form-group"><label class="form-label">Apellido</label><input class="form-input" id="cl-ape"></div></div><div class="form-group"><label class="form-label">Telefono</label><input class="form-input" id="cl-tel" type="tel"></div><div class="form-group"><label class="form-label">Email</label><input class="form-input" id="cl-mail" type="email"></div><div class="form-group"><label class="form-label">Direccion</label><input class="form-input" id="cl-dir"></div><div class="grid-2"><div class="form-group"><label class="form-label">DNI</label><input class="form-input" id="cl-dni"></div><div class="form-group"><label class="form-label">CUIT/CUIL</label><input class="form-input" id="cl-cuit"></div></div><button class="btn btn-primary" onclick="guardarCliente()">Guardar cliente</button>`)}
window.guardarCliente=async function(){const {error}=await sb.from('clientes').insert({nombre:v('cl-nom'),apellido:v('cl-ape'),telefono:v('cl-tel'),email:v('cl-mail'),direccion:v('cl-dir'),dni:v('cl-dni'),cuit_cuil:v('cl-cuit')});if(error){toast('error','Error al guardar');return}cacheInvalidate('clientes');toast('success','Cliente guardado ✅');cerrarModal();renderClientes()}

function renderReportes(){document.getElementById('content').innerHTML='<div class="card"><div style="text-align:center;padding:40px"><div style="font-size:40px;margin-bottom:12px">📈</div><div style="font-weight:700;margin-bottom:8px">Reportes</div><div style="color:var(--muted);font-size:13px">Lo definimos en la proxima etapa</div></div></div>'}
function renderMas(){
  const items=[{icon:'🛒',label:'Compras',page:'compras'},{icon:'📦',label:'Inventario',page:'inventario'},{icon:'👥',label:'Clientes',page:'clientes'},{icon:'📈',label:'Reportes',page:'reportes'}]
  document.getElementById('content').innerHTML='<div class="card">'+items.map(o=>'<div class="list-item" onclick="navegar(\''+o.page+'\')"><div class="list-item-title">'+o.icon+' '+o.label+'</div><span style="color:var(--accent);font-size:18px">›</span></div>').join('')+'</div>'
}

function abrirModal(html){document.getElementById('modal-content').innerHTML=html;document.getElementById('modal-overlay').classList.add('open')}
window.cerrarModal=function(e){if(!e||e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.remove('open')}
window.toast=function(tipo,msg){const iconos={success:'✅',error:'❌',warn:'⚠️',info:'ℹ️'};const wrap=document.getElementById('toast-wrap');const t=document.createElement('div');t.className='toast '+tipo;t.innerHTML='<span style="font-size:16px">'+(iconos[tipo]||'ℹ️')+'</span><span style="font-size:13px">'+msg+'</span>';wrap.appendChild(t);setTimeout(()=>t.remove(),3500)}

// ── REALTIME ─────────────────────────────────────────────
// Escucha cambios en tablas críticas y refresca la vista activa
const _realtimeTables = ['insumos','productos','ventas','formula_componentes']
_realtimeTables.forEach(tabla => {
  sb.channel(`rt-${tabla}`)
    .on('postgres_changes', { event: '*', schema: 'public', table: tabla }, () => {
      cacheInvalidate(tabla)
      // Refrescar solo si el usuario está viendo esa sección relevante
      const mapa = {
        insumos: ['insumos','dashboard'],
        productos: ['inventario','dashboard'],
        ventas: ['ventas','dashboard'],
        formula_componentes: ['formulas']
      }
      if (mapa[tabla]?.includes(_paginaActual)) {
        renderPagina(_paginaActual)
      }
    })
    .subscribe()
})



queueFlush();renderDashboard()
</script>
