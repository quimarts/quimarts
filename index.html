// ── CACHE LOCAL ───────────────────────────────────────────
const cache = {}
const CACHE_TTL = 60000 // 1 minuto
function cacheGet(key) {
  const c = cache[key]
  if (!c) return null
  if (Date.now() - c.ts > CACHE_TTL) { delete cache[key]; return null }
  return c.data
}
function cacheSet(key, data) { cache[key] = { data, ts: Date.now() } }
function cacheInvalidate(...keys) { keys.forEach(k => { if(k) delete cache[k]; else Object.keys(cache).forEach(k2=>delete cache[k2]) }) }

// ── OFFLINE QUEUE ─────────────────────────────────────────
const QUEUE_KEY = 'qa_offline_queue'
function queueGet() { try { return JSON.parse(localStorage.getItem(QUEUE_KEY)||'[]') } catch(e) { return [] } }
function queueSave(q) { try { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)) } catch(e) {} }
async function queueAdd(op) {
  const q = queueGet(); q.push({...op, id: Date.now(), ts: new Date().toISOString()}); queueSave(q)
}
async function queueFlush() {
  if (!navigator.onLine) return
  const q = queueGet(); if (!q.length) return
  const failed = []
  for (const op of q) {
    try {
      if (op.type === 'insert') await sb.from(op.table).insert(op.data)
      else if (op.type === 'update') await sb.from(op.table).update(op.data).eq('id', op.id_val)
      else if (op.type === 'upsert') await sb.from(op.table).upsert(op.data)
    } catch(e) { failed.push(op) }
  }
  queueSave(failed)
  if (failed.length < q.length) { cacheInvalidate(); toast('success', 'Sincronizado con la nube ✅') }
}
window.addEventListener('online', () => { queueFlush(); toast('info', 'Conexion restaurada') })
window.addEventListener('offline', () => toast('warn', 'Sin conexion — cambios guardados localmente'))

// ── SKELETON ──────────────────────────────────────────────
function skeleton(n=4) {
  return '<div class="card">' + Array(n).fill(0).map(()=>
    '<div class="list-item" style="cursor:default">' +
    '<div class="list-item-left">' +
    '<div style="height:14px;width:140px;background:var(--border);border-radius:4px;margin-bottom:6px"></div>' +
    '<div style="height:11px;width:90px;background:var(--border);border-radius:4px;opacity:.6"></div>' +
    '</div>' +
    '<div style="height:22px;width:50px;background:var(--border);border-radius:4px"></div>' +
    '</div>'
  ).join('') + '</div>'
}

// ── DB HELPER: online/offline ─────────────────────────────
async function dbInsert(table, data) {
  if (navigator.onLine) {
    const {error} = await sb.from(table).insert(data)
    if (error) throw error
  } else {
    await queueAdd({type:'insert', table, data})
  }
  cacheInvalidate(table)
}
async function dbUpdate(table, data, id) {
  if (navigator.onLine) {
    const {error} = await sb.from(table).update(data).eq('id', id)
    if (error) throw error
  } else {
    await queueAdd({type:'update', table, data, id_val: id})
  }
  cacheInvalidate(table)
}
async function dbUpsertStock(table, id, newStock, extraFields={}) {
  const data = {stock: newStock, ...extraFields}
  if (navigator.onLine) {
    await sb.from(table).update(data).eq('id', id)
  } else {
    await queueAdd({type:'update', table, data, id_val: id})
  }
  cacheInvalidate(table)
}

function v(id){return document.getElementById(id)?.value?.trim()||''}
function n(id){return parseFloat(document.getElementById(id)?.value)||0}
function esIlimitado(i){return !i.stock_minimo&&!i.stock&&!i.ppu}
function estadoInsumo(s,vol){const p=vol>0?(s/vol)*100:100;if(p>=50)return['green','Normal',p];if(p>=30)return['warn','Medio',p];if(p>=10)return['danger','Bajo',p];return['danger','Critico',p]}
const titulos={dashboard:'Dashboard',insumos:'Insumos',formulas:'Formulas',ventas:'Ventas',compras:'Compras',inventario:'Inventario',clientes:'Clientes',reportes:'Reportes',mas:'Menu'}
let _paginaActual='dashboard'
window.navegar=function(p){_paginaActual=p;document.querySelectorAll('.drawer-item').forEach(b=>b.classList.toggle('active',b.dataset.page===p));document.getElementById('page-title').textContent=titulos[p]||p;cerrarDrawer();renderPagina(p)}

// ── CONTRASEÑAS Y SÚPER USUARIO ──────────────────────────
let _passCache = { admin: 'tefaltapila', superuser: 'tefaltapila' }

async function loadPasses() {
  try {
    const { data } = await sb.from('configuracion').select('clave,valor').in('clave', ['pass_admin','pass_superuser'])
    if (data?.length) {
      const map = Object.fromEntries(data.map(r => [r.clave, r.valor]))
      _passCache = {
        admin:     map.pass_admin     || 'tefaltapila',
        superuser: map.pass_superuser || 'tefaltapila'
      }
    }
  } catch(e) { /* sin conexión: usa defaults */ }
}

function getPasses() { return _passCache }

async function savePasses(p) {
  _passCache = p
  try {
    await Promise.all([
      sb.from('configuracion').upsert({ clave: 'pass_admin',     valor: p.admin,     updated_at: new Date().toISOString() }, { onConflict: 'clave' }),
      sb.from('configuracion').upsert({ clave: 'pass_superuser', valor: p.superuser, updated_at: new Date().toISOString() }, { onConflict: 'clave' })
    ])
  } catch(e) { toast('warn', 'Contraseña guardada localmente — sin conexión') }
}

function isSuperUser(){return sessionStorage.getItem('qa_superuser')==='1'}
function setSuperUser(on){if(on)sessionStorage.setItem('qa_superuser','1');else sessionStorage.removeItem('qa_superuser')}
Object.defineProperty(window,'ADMIN_PASS',{get:()=>getPasses().admin})

// ── CONFIRMACIÓN CON CONTRASEÑA Y MOTIVO ─────────────────
// Uso: pedirConfirmacionSegura({titulo, descripcion, conMotivo, onConfirm})
window.pedirConfirmacionSegura=function({titulo,descripcion,onConfirm,conMotivo=true,etiquetaMotivo='Motivo'}){
  // SÚPER USUARIO: ejecuta directamente sin pedir nada
  if(isSuperUser()){
    onConfirm&&setTimeout(()=>onConfirm('Súper usuario'),50)
    return
  }
  abrirModal(`<button class="modal-close" onclick="cerrarModal()">✕</button>
    <div class="modal-title">${titulo}</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px">${descripcion}</div>
    ${conMotivo?`<div class="form-group"><label class="form-label">${etiquetaMotivo} <span style="color:var(--danger)">*</span></label>
      <input class="form-input" id="conf-motivo" placeholder="Ingresá el motivo..." maxlength="200"></div>`:''}
    <div class="form-group"><label class="form-label">Contraseña <span style="color:var(--danger)">*</span></label>
      <input class="form-input" id="conf-pass" type="password" placeholder="Contraseña de administrador"
        onkeydown="if(event.key==='Enter')ejecutarConfirmacion()"></div>
    <div class="btn-row">
      <button class="btn btn-ghost" style="flex:1" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-danger" style="flex:1" onclick="ejecutarConfirmacion()">Confirmar</button>
    </div>`)
  window._pendingConfirm={onConfirm,conMotivo}
  setTimeout(()=>document.getElementById(conMotivo?'conf-motivo':'conf-pass')?.focus(),100)
}
window.ejecutarConfirmacion=function(){
  const pass=document.getElementById('conf-pass')?.value
  const motivo=document.getElementById('conf-motivo')?.value?.trim()
  if(!pass){toast('error','Ingresá la contraseña');return}

  const fn=window._pendingConfirm?.onConfirm
  cerrarModal()
  if(fn)setTimeout(()=>fn(motivo),150)
}

async function renderPagina(p){document.getElementById('content').innerHTML=skeleton(3);const map={dashboard:renderDashboard,insumos:renderInsumos,formulas:renderFormulas,ventas:renderVentas,compras:renderCompras,inventario:renderInventario,clientes:renderClientes,reportes:renderReportes,mas:renderMas};if(map[p])await map[p]();else document.getElementById('content').innerHTML='<div class="loading">Proximamente</div>'}

async function renderDashboard(){
  const [{data:ins},{data:prods},{data:vendeuda}]=await Promise.all([
    sb.from('insumos').select('id,stock,stock_minimo,nombre,ppu').eq('activo',true),
    sb.from('productos').select('stock,stock_minimo,nombre').eq('activo',true),
    sb.from('ventas').select('id,cliente_libre,saldo_pendiente,clientes(nombre,apellido)').eq('estado_pago','debe')
  ])
  const insConVol=ins?.filter(i=>!esIlimitado(i)&&i.stock_minimo>0)||[]
  const insCrit=insConVol.filter(i=>(i.stock/i.stock_minimo)*100<10)
  const insBaj=insConVol.filter(i=>{const p=(i.stock/i.stock_minimo)*100;return p>=10&&p<30})
  const insMed=insConVol.filter(i=>{const p=(i.stock/i.stock_minimo)*100;return p>=30&&p<50})
  const pCrit=prods?.filter(p=>p.stock===0)||[]
  const pBaj=prods?.filter(p=>p.stock_minimo>0&&p.stock>0&&p.stock<=p.stock_minimo)||[]
  const tot=insCrit.length+insBaj.length+insMed.length+pCrit.length+pBaj.length+(vendeuda?.length||0)
  document.getElementById('content').innerHTML=`
    <div class="big-btn-grid">
      <button class="big-btn primary" onclick="navegar('ventas')"><div class="big-icon">💰</div><div class="big-label">Vender</div></button>
      <button class="big-btn success" onclick="navegar('inventario')"><div class="big-icon">📦</div><div class="big-label">Inventario</div></button>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">🔔 Alertas</span>${tot>0?`<span class="badge badge-danger">${tot}</span>`:'<span class="badge badge-green">Todo OK</span>'}</div>
      ${tot===0?'<div class="loading" style="padding:20px">Sin alertas por ahora 👍</div>':''}
      ${insCrit.length?`<div style="padding:10px 16px 4px;font-size:11px;color:var(--danger);font-weight:700;text-transform:uppercase">🔴 Insumos criticos (&lt;10%)</div>${insCrit.map(i=>`<div class="list-item" onclick="navegar('insumos')"><div class="list-item-left"><div class="list-item-title">${i.nombre}</div><div class="list-item-sub">${i.stock} u · ${Math.round((i.stock/i.stock_minimo)*100)}%</div></div><span class="badge badge-danger">Critico</span></div>`).join('')}`:''}
      ${insBaj.length?`<div style="padding:10px 16px 4px;font-size:11px;color:var(--danger);font-weight:700;text-transform:uppercase">🟠 Insumos bajos (10-29%)</div>${insBaj.map(i=>`<div class="list-item" onclick="navegar('insumos')"><div class="list-item-left"><div class="list-item-title">${i.nombre}</div><div class="list-item-sub">${i.stock} u · ${Math.round((i.stock/i.stock_minimo)*100)}%</div></div><span class="badge badge-danger">Bajo</span></div>`).join('')}`:''}
      ${insMed.length?`<div style="padding:10px 16px 4px;font-size:11px;color:var(--warn);font-weight:700;text-transform:uppercase">🟡 Insumos medios (30-49%)</div>${insMed.map(i=>`<div class="list-item" onclick="navegar('insumos')"><div class="list-item-left"><div class="list-item-title">${i.nombre}</div><div class="list-item-sub">${i.stock} u · ${Math.round((i.stock/i.stock_minimo)*100)}%</div></div><span class="badge badge-warn">Medio</span></div>`).join('')}`:''}
      ${pCrit.length?`<div style="padding:10px 16px 4px;font-size:11px;color:var(--danger);font-weight:700;text-transform:uppercase">🔴 Productos sin stock</div>${pCrit.map(p=>`<div class="list-item" onclick="navegar('inventario')"><div class="list-item-left"><div class="list-item-title">${p.nombre}</div><div class="list-item-sub">Sin unidades</div></div><span class="badge badge-danger">Sin stock</span></div>`).join('')}`:''}
      ${pBaj.length?`<div style="padding:10px 16px 4px;font-size:11px;color:var(--warn);font-weight:700;text-transform:uppercase">🟡 Productos stock bajo</div>${pBaj.map(p=>`<div class="list-item" onclick="navegar('inventario')"><div class="list-item-left"><div class="list-item-title">${p.nombre}</div><div class="list-item-sub">Stock: ${p.stock} / Min: ${p.stock_minimo}</div></div><span class="badge badge-warn">Bajo</span></div>`).join('')}`:''}
      ${vendeuda?.length?`<div style="padding:10px 16px 4px;font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase">💳 Saldos pendientes</div>${vendeuda.map(vt=>{const cli=vt.clientes?`${vt.clientes.nombre} ${vt.clientes.apellido||''}`:(vt.cliente_libre||'Consumidor Final');return`<div class="list-item" onclick="modalComprobante('${vt.id}')"><div class="list-item-left"><div class="list-item-title">${cli}</div><div class="list-item-sub">Saldo pendiente</div></div><span style="font-weight:700;color:var(--danger)">$${Number(vt.saldo_pendiente).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>`}).join('')}`:''}
    </div>`
}

async function renderInsumos(){
  const c=document.getElementById('content');c.innerHTML=skeleton(5)
  let data=cacheGet('insumos')
  if(!data){const r=await sb.from('insumos').select('*').eq('activo',true).order('nombre');data=r.data;cacheSet('insumos',data)}
  document.getElementById('content').innerHTML=`
    <button class="btn btn-primary" style="margin-bottom:16px" onclick="modalNuevoInsumo()">+ Nuevo insumo</button>
    <div class="card">${!data?.length?'<div class="loading">Sin insumos cargados</div>':data.map(i=>{
      if(esIlimitado(i))return`<div class="list-item" onclick="modalEditarInsumo('${i.id}')"><div class="list-item-left"><div class="list-item-title">${i.nombre}</div><div class="list-item-sub">${i.categoria||'Sin categoria'} · PPG/U: $0</div></div><div class="list-item-right"><span style="font-weight:700;color:var(--accent);font-size:18px">∞</span><span class="badge badge-purple">Ilimitado</span></div></div>`
      const [cls,lbl,pct]=estadoInsumo(i.stock,i.stock_minimo)
      const pr=Math.min(Math.round(pct),100)
      const bc=cls==='green'?'var(--accent2)':cls==='warn'?'var(--warn)':'var(--danger)'
      return`<div class="list-item" onclick="modalEditarInsumo('${i.id}')"><div class="list-item-left"><div class="list-item-title">${i.nombre}</div><div class="list-item-sub">${i.categoria||'Sin categoria'} · PPG/U: $${Number(i.ppu).toFixed(2)}</div><div class="pct-bar"><div class="pct-fill" style="width:${pr}%;background:${bc}"></div></div></div><div class="list-item-right"><span style="font-weight:700">${i.stock} u</span><span class="badge badge-${cls}">${lbl} ${Math.round(pct)}%</span></div></div>`
    }).join('')}</div>`
}

window.calcPPUI=function(){const vol=parseFloat(document.getElementById('i-vol')?.value)||0;const precio=parseFloat(document.getElementById('i-precio')?.value)||0;const p=document.getElementById('i-ppuprev');if(p&&vol&&precio)p.textContent='PPG/U calculado: $'+(precio/vol).toFixed(2);else if(p)p.textContent=''}
window.guardarInsumo=async function(){
  const nom=v('i-nom');if(!nom){toast('error','El nombre es obligatorio');return}
  const tipo=v('i-tipo')||'insumo'
  const vol=n('i-vol'),precio=n('i-precio'),stock=n('i-stock')
  const ppu=vol&&precio?Number((precio/vol).toFixed(2)):0
  const {error}=await sb.from('insumos').insert({nombre:nom,categoria:v('i-cat'),tipo,stock,stock_minimo:vol,ppu,precio_compra:precio})
  if(error){toast('error','Error: '+error.message);return}
  cacheInvalidate('insumos');toast('success',(vol===0&&precio===0&&stock===0)?'Insumo ilimitado guardado':'Insumo guardado ✅')
  cerrarModal();renderInsumos()
}

  const tipoActual=i.tipo&&i.tipo!=='formula'?i.tipo:'insumo'
  abrirModal(`<button class="modal-close" onclick="cerrarModal()">✕</button>
    <div class="modal-title">✏️ ${i.nombre}</div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px">
      ${inf?'<span class="badge badge-purple">Ilimitado</span><span style="font-size:13px;color:var(--muted)">Sin stock ni costo</span>':`<span class="badge badge-${cls}">${lbl}</span><span style="font-size:13px;color:var(--muted)">${i.stock} u · ${Math.round(pct)}% del volumen</span>`}
    </div>
    <div class="form-group"><label class="form-label">Nombre</label><input class="form-input" id="ei-nom" value="${i.nombre}"></div>
    <div class="form-group"><label class="form-label">Tipo</label>
      <select class="form-select" id="ei-tipo">
        <option value="insumo" ${tipoActual==='insumo'?'selected':''}>Insumo (materia prima)</option>
        <option value="envase" ${tipoActual==='envase'?'selected':''}>Envase</option>
        <option value="etiqueta" ${tipoActual==='etiqueta'?'selected':''}>Etiqueta</option>
        <option value="otro" ${tipoActual==='otro'?'selected':''}>Otro (tapas, precintos, etc.)</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Categoria</label><input class="form-input" id="ei-cat" value="${i.categoria||''}"></div>
    <div class="form-group"><label class="form-label">Stock actual (u)</label><input class="form-input" id="ei-stock" type="number" value="${i.stock}"></div>
    <div class="grid-2">
      <div class="form-group"><label class="form-label">Volumen de compra</label><input class="form-input" id="ei-vol" type="number" value="${i.stock_minimo||0}" oninput="calcPPUEdit()"></div>
      <div class="form-group"><label class="form-label">Precio total ($)</label><input class="form-input" id="ei-precio" type="number" value="${i.precio_compra||0}" oninput="calcPPUEdit()"></div>
    </div>
    <div class="form-group"><label class="form-label">PPG/U <span style="color:var(--muted);font-size:12px">(se recalcula solo, o editalo manual)</span></label><input class="form-input" id="ei-ppu" type="number" value="${i.ppu}" step="0.01"></div>

      <button class="btn btn-primary" onclick="actualizarInsumo('${id}')">Guardar cambios</button>

}
window.calcPPUEdit=function(){const vol=parseFloat(document.getElementById('ei-vol')?.value)||0;const precio=parseFloat(document.getElementById('ei-precio')?.value)||0;if(vol&&precio)document.getElementById('ei-ppu').value=(precio/vol).toFixed(2)}
window.actualizarInsumo=async function(id){const {error}=await sb.from('insumos').update({nombre:v('ei-nom'),tipo:v('ei-tipo')||'insumo',categoria:v('ei-cat'),stock:n('ei-stock'),stock_minimo:n('ei-vol'),precio_compra:n('ei-precio'),ppu:Number((n('ei-ppu')||0).toFixed(2))}).eq('id',id);if(error){toast('error','Error al guardar');return}cacheInvalidate('insumos');toast('success','Insumo actualizado ✅');cerrarModal();renderInsumos()}

  const {data:ins}=await sb.from('insumos').select('id,nombre').eq('activo',true).order('nombre')
  abrirModal(`<button class="modal-close" onclick="cerrarModal()">✕</button>
    <div class="modal-title">⚗️ Nueva formula</div>
    <div class="form-group"><label class="form-label">Nombre *</label><input class="form-input" id="f-nom" placeholder="Ej: Soda al 50%"></div>
    <div class="section-title">Componentes</div>
    <div style="background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.2);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--label)">
      Pones cantidades (400+200+400) o porcentajes (40+20+40). El % se calcula solo sobre el total.
    </div>
    <div id="comp-list"></div>
    <div id="comp-total" style="font-size:13px;color:var(--muted);margin-bottom:10px;text-align:right"></div>

window.addComp=function(ins){
  const idx=document.getElementById('comp-list').children.length
  const d=document.createElement('div');d.style.cssText='display:flex;gap:8px;margin-bottom:10px;align-items:center'
  d.innerHTML='<select class="form-select" id="c-ins-'+idx+'" style="flex:2"><option value="">Insumo</option>'+ins.map(i=>'<option value="'+i.id+'">'+i.nombre+'</option>').join('')+'</select><input class="form-input" id="c-cant-'+idx+'" type="number" placeholder="cant." style="flex:1" oninput="updTotalPct()"><button onclick="this.parentElement.remove();updTotalPct()" style="background:none;border:none;color:var(--danger);font-size:20px;cursor:pointer;padding:4px;flex-shrink:0">✕</button>'
  document.getElementById('comp-list').appendChild(d);updTotalPct()
}
window.updTotalPct=function(){
  let t=0,idx=0
  while(document.getElementById('c-cant-'+idx)){t+=parseFloat(document.getElementById('c-cant-'+idx).value)||0;idx++}
  const el=document.getElementById('comp-total')
  if(!el)return
  if(t===0){el.innerHTML='';return}
  let preview='';let i2=0
  while(document.getElementById('c-cant-'+i2)){
    const cant=parseFloat(document.getElementById('c-cant-'+i2).value)||0
    const pct=t>0?(cant/t*100).toFixed(1):0
    if(cant)preview+='<span style="color:var(--accent2)">'+pct+'%</span> '
    i2++
  }
  el.innerHTML='Total: <strong style="color:var(--accent2)">'+t+'</strong> u → '+preview
}
window.guardarFormula=async function(){
  const nom=v('f-nom');if(!nom){toast('error','El nombre es obligatorio');return}
  const comps=[];let idx=0,totalCant=0
  while(document.getElementById('c-ins-'+idx)){
    const insId=document.getElementById('c-ins-'+idx).value
    const cant=parseFloat(document.getElementById('c-cant-'+idx).value)||0
    if(insId&&cant){comps.push({insId,cant});totalCant+=cant}
    idx++
  }
  if(!comps.length){toast('error','Agrega al menos un componente');return}
  if(!totalCant){toast('error','Las cantidades no pueden ser 0');return}
  const {data:f,error}=await sb.from('formulas').insert({nombre:nom,rendimiento:totalCant,mo_pct:0,ganancia_pct:0,envasado_pct:0}).select().single()
  if(error){toast('error','Error al guardar');return}
  await sb.from('formula_componentes').insert(comps.map(c=>({formula_id:f.id,insumo_id:c.insId,cantidad:c.cant})))
  cacheInvalidate('formulas','insumos');toast('success','Formula guardada ✅');cacheInvalidate('formulas','insumos');cerrarModal();renderFormulas()
}
window.modalVerFormula=async function(id){
  const [{data:f},{data:comps}]=await Promise.all([
    sb.from('formulas').select('*').eq('id',id).single(),
    sb.from('formula_componentes').select('cantidad,insumos(id,nombre,ppu,stock,stock_minimo)').eq('formula_id',id)
  ])
  abrirModal(`<button class="modal-close" onclick="cerrarModal()">✕</button>
    <div class="modal-title">⚗️ ${f.nombre}</div>
    <div class="section-title">Composicion (base ${f.rendimiento} u)</div>
    <div class="card" style="margin-bottom:14px">
      ${(()=>{const rows=comps?.map(c=>{const pct=((c.cantidad/f.rendimiento)*100).toFixed(1);const inf=esIlimitado(c.insumos);const costo=inf?null:c.cantidad*c.insumos.ppu;return'<div class="list-item" style="cursor:default"><div class="list-item-left"><div class="list-item-title">'+c.insumos.nombre+'</div><div class="list-item-sub">'+pct+'% · '+c.cantidad+' u base</div></div><span style="font-weight:600;color:'+(inf?'var(--accent)':'var(--text)')+'">+'+(inf?'∞':'$'+costo.toFixed(2))+'</span></div>'}).join('');const total=comps?.reduce((s,c)=>esIlimitado(c.insumos)?s:s+c.cantidad*c.insumos.ppu,0)||0;const ppuBase=f.rendimiento>0?(total/f.rendimiento).toFixed(4):0;return rows+'<div class="list-item" style="cursor:default;border-top:2px solid var(--border)"><strong style="color:var(--label)">Costo total base</strong><div style="text-align:right"><strong style="color:var(--accent2)">$'+total.toFixed(2)+'</strong><div style="font-size:11px;color:var(--muted)">PPG/U: $'+ppuBase+'</div></div></div>'})()}
    </div>
    <div class="section-title">🔢 Calculadora</div>
    <div class="form-group"><label class="form-label">Quiero producir (u)</label>
      <input class="form-input" id="calc-cant" type="number" value="${f.rendimiento}" oninput='calcFormula(${JSON.stringify(comps)},${f.rendimiento})'>
    </div>
    <div id="calc-res"></div>
    <button class="btn btn-success" style="margin-top:8px" onclick='producirFormula("${f.id}","${f.nombre}",${JSON.stringify(comps)},${f.rendimiento})'>✅ Producir y descontar stock</button>
    <button class="btn btn-danger btn-sm" style="margin-top:8px;width:100%" onclick="eliminarFormula('${f.id}')">🗑 Eliminar fórmula</button>`)
  calcFormula(comps,f.rendimiento)
}
window.calcFormula=function(comps,rend){
  const cant=parseFloat(document.getElementById('calc-cant').value)||0
  const factor=cant/rend
  const insuf=comps.filter(c=>!esIlimitado(c.insumos)&&c.insumos.stock<c.cantidad*factor)
  let costoTotal=0
  const rows=comps.map(c=>{
    const nec=(c.cantidad*factor).toFixed(2)
    const pct=((c.cantidad/rend)*100).toFixed(1)
    const inf=esIlimitado(c.insumos)
    const ok=inf||c.insumos.stock>=c.cantidad*factor
    const costo=inf?null:c.cantidad*factor*c.insumos.ppu
    if(!inf)costoTotal+=costo
    return'<div class="list-item" style="cursor:default"><div class="list-item-left"><div class="list-item-title">'+c.insumos.nombre+' <span style="color:var(--muted);font-weight:400">('+pct+'%)</span></div><div class="list-item-sub" style="color:'+(ok?'var(--accent2)':'var(--danger)')+'>'+(inf?'Ilimitado — no descuenta stock':'Stock: '+c.insumos.stock+' u')+'</div></div><div style="text-align:right"><span style="font-weight:700">'+nec+' u</span>'+(inf?'':'<div style="font-size:11px;color:var(--muted)">$'+costo.toFixed(2)+'</div>')+'</div></div>'
  }).join('')
  const ppuEst=cant>0?(costoTotal/cant).toFixed(4):'—'
  const totalRow='<div class="list-item" style="cursor:default;border-top:2px solid var(--border)"><strong style="color:var(--label)">Costo total</strong><div style="text-align:right"><strong style="color:var(--accent2)">$'+costoTotal.toFixed(2)+'</strong><div style="font-size:11px;color:var(--muted)">PPG/U estimado: $'+ppuEst+'</div></div></div>'
  document.getElementById('calc-res').innerHTML='<div class="card">'+rows+totalRow+'</div>'+(insuf.length?'<div style="background:rgba(224,92,92,.1);border:1px solid rgba(224,92,92,.3);border-radius:8px;padding:12px;margin-top:8px;font-size:13px;color:var(--danger)">⚠️ Stock insuficiente: '+insuf.map(c=>c.insumos.nombre).join(', ')+'</div>':'')
}
window.producirFormula=async function(fId,fNom,comps,rend){
  const cant=parseFloat(document.getElementById('calc-cant').value)||0
  if(!cant){toast('error','Ingresa una cantidad');return}
  const factor=cant/rend
  for(const c of comps){if(!esIlimitado(c.insumos)&&c.insumos.stock<c.cantidad*factor){toast('error','Stock insuficiente: '+c.insumos.nombre);return}}
  // calcular PPG/U de la formula = costo total ingredientes / unidades producidas
  let costoTotal=0
  for(const c of comps){
    if(!esIlimitado(c.insumos)){
      costoTotal+=c.cantidad*factor*c.insumos.ppu
      await sb.from('insumos').update({stock:c.insumos.stock-c.cantidad*factor}).eq('id',c.insumos.id)
    }
  }
  const ppuFormula=cant>0?Number((costoTotal/cant).toFixed(2)):0
  const {data:existe}=await sb.from('insumos').select('id,stock').eq('nombre',fNom).eq('tipo','formula').maybeSingle()
  if(existe){
    await sb.from('insumos').update({stock:existe.stock+cant,ppu:ppuFormula,stock_minimo:existe.stock+cant}).eq('id',existe.id)
  }else{
    await sb.from('insumos').insert({nombre:fNom,tipo:'formula',stock:cant,ppu:ppuFormula,stock_minimo:cant,activo:true})
  }
  await sb.from('producciones_formula').insert({formula_id:fId,cantidad:cant})
  toast('success',cant+' u de "'+fNom+'" producidas · PPG/U: $'+ppuFormula.toFixed(2)+' ✅')
  cerrarModal();renderFormulas()
}

window.recalcProd=function(){
  const ins=window._insumosCache||[]
  const insId=document.getElementById('p-ins')?.value
  const cins=parseFloat(document.getElementById('p-cins')?.value)||0
  const mo=parseFloat(document.getElementById('p-mo')?.value)||0
  const gan=parseFloat(document.getElementById('p-gan')?.value)||0
  const envp=parseFloat(document.getElementById('p-envp')?.value)||0
  const insumo=ins.find(i=>i.id===insId)
  if(!insumo||!cins){document.getElementById('p-pprev').innerHTML='';return}
  const cb=insumo.ppu*cins
  const eS=document.getElementById('p-env'),tS=document.getElementById('p-etiq')
  const ppE=eS?.value?parseFloat(eS.options[eS.selectedIndex].dataset.ppu)||0:0
  const ppT=tS?.value?parseFloat(tS.options[tS.selectedIndex].dataset.ppu)||0:0
  // Otros 1/2/3: selects opcionales, cada uno suma su propio costo
  const getOtroPP=id=>{const s=document.getElementById(id);return s?.value?parseFloat(s.options[s.selectedIndex].dataset.ppu)||0:0}
  const ppO1=getOtroPP('p-otro1'),ppO2=getOtroPP('p-otro2'),ppO3=getOtroPP('p-otro3')
  const moMonto=cb*(mo/100)
  const ganMonto=cb*(gan/100)
  const baseEnvasado=cb+moMonto+ganMonto
  const envpMonto=baseEnvasado*(envp/100)
  const sug=baseEnvasado+envpMonto+ppE+ppT+ppO1+ppO2+ppO3
  window._costo=cb;window._sugerido=sug
  document.getElementById('p-pprev').innerHTML=`<div class="precio-preview">
    <div class="precio-row"><span>Costo base</span><span>$${cb.toFixed(2)}</span></div>
    <div class="precio-row"><span>Mano de obra (producción)</span><span>$${moMonto.toFixed(2)}</span></div>
    <div class="precio-row"><span>Ganancia</span><span>$${ganMonto.toFixed(2)}</span></div>
    <div class="precio-row"><span>Mano de obra (envasado)</span><span>$${envpMonto.toFixed(2)}</span></div>
    <div class="precio-row"><span>Envase</span><span>$${ppE.toFixed(2)}</span></div>
    <div class="precio-row"><span>Etiqueta</span><span>$${ppT.toFixed(2)}</span></div>
    ${ppO1?`<div class="precio-row"><span>Otros 1</span><span>$${ppO1.toFixed(2)}</span></div>`:''}
    ${ppO2?`<div class="precio-row"><span>Otros 2</span><span>$${ppO2.toFixed(2)}</span></div>`:''}
    ${ppO3?`<div class="precio-row"><span>Otros 3</span><span>$${ppO3.toFixed(2)}</span></div>`:''}
    <div class="precio-row total"><span>Precio sugerido</span><span>$${sug.toFixed(2)}</span></div>
  </div>`
  if(!document.getElementById('p-pventa').value)document.getElementById('p-pventa').placeholder=sug.toFixed(2)
}

window.producirProducto=async function(id,nom){
  const cant=n('pp-cant');if(!cant){toast('error','Ingresá una cantidad');return}
  const variedadId=document.getElementById('pp-variedad')?.value||null
  const {data:p}=await sb.from('productos').select('*,insumos(id,stock,nombre,stock_minimo,ppu)').eq('id',id).single()
  const nec=p.cantidad_insumo*cant
  if(p.insumos&&!esIlimitado(p.insumos)&&p.insumos.stock<nec){toast('error','Stock insuficiente: '+p.insumos.nombre+' (hay '+p.insumos.stock+' u, necesitas '+nec+')');return}
  if(p.insumo_id&&!esIlimitado(p.insumos))await sb.from('insumos').update({stock:p.insumos.stock-nec}).eq('id',p.insumo_id)
  if(variedadId){
    const {data:vr}=await sb.from('producto_variedades').select('stock').eq('id',variedadId).single()
    await sb.from('producto_variedades').update({stock:vr.stock+cant}).eq('id',variedadId)
  }else{
    await sb.from('productos').update({stock:p.stock+cant}).eq('id',id)
  }
  await sb.from('producciones_producto').insert({producto_id:id,cantidad:cant,insumo_id:p.insumo_id||null,cantidad_insumo:nec,variedad_id:variedadId,estado:'activa'})
  toast('success',cant+' u de "'+nom+'" producidas ✅');cerrarModal();renderInventario()
}
window.anularProduccion=async function(prodId,motivo){
  const {data:prod}=await sb.from('producciones_producto').select('*').eq('id',prodId).single()
  if(prod.estado==='anulada'){toast('warn','Ya fue anulada');return}
  if(prod.variedad_id){
    const {data:vr}=await sb.from('producto_variedades').select('stock').eq('id',prod.variedad_id).single()
    await sb.from('producto_variedades').update({stock:Math.max(0,vr.stock-prod.cantidad)}).eq('id',prod.variedad_id)
  }else{
    const {data:p}=await sb.from('productos').select('stock').eq('id',prod.producto_id).single()
    await sb.from('productos').update({stock:Math.max(0,p.stock-prod.cantidad)}).eq('id',prod.producto_id)
  }
  if(prod.insumo_id&&prod.cantidad_insumo>0){
    const {data:ins}=await sb.from('insumos').select('stock').eq('id',prod.insumo_id).single()
    await sb.from('insumos').update({stock:ins.stock+prod.cantidad_insumo}).eq('id',prod.insumo_id)
  }
  await sb.from('producciones_producto').update({estado:'anulada',motivo_anulacion:motivo}).eq('id',prodId)
  await sb.from('auditoria').insert({tipo:'anulacion_produccion',referencia_id:prodId,descripcion:'Producción anulada',motivo})
  cacheInvalidate('productos');cacheInvalidate('insumos')
  toast('success','Producción anulada — stock revertido ✅');renderInventario()
}

}

window.calcPPU=function(origen){
  const cant=parseFloat(document.getElementById('co-cant')?.value)||0
  const monto=parseFloat(document.getElementById('co-monto')?.value)||0
  const ppu=parseFloat(document.getElementById('co-ppu')?.value)||0
  const prev=document.getElementById('co-ppuprev')
  if(origen==='cant'||origen==='monto'){
    // Volumen + Monto → PPU
    if(cant&&monto){
      const calc=(monto/cant)
      document.getElementById('co-ppu').value=calc.toFixed(2)
      if(prev)prev.textContent='PPG/U: $'+calc.toFixed(2)
    }
  }else if(origen==='ppu'){
    if(ppu&&cant){
      // PPU + Volumen → Monto
      const calc=ppu*cant
      document.getElementById('co-monto').value=calc.toFixed(2)
      if(prev)prev.textContent='Monto total: $'+calc.toFixed(2)
    }else if(ppu&&monto){
      // PPU + Monto → Volumen
      const calc=monto/ppu
      document.getElementById('co-cant').value=calc.toFixed(2)
      if(prev)prev.textContent='Volumen calculado: '+calc.toFixed(2)
    }
  }
}
window.guardarCompra=async function(){
  const tipo=document.getElementById('co-tipo').value
  const met=document.getElementById('co-met').value
  const prov=v('co-prov')
  const fechaVal=document.getElementById('co-fecha')?.value
  const fecha=fechaVal?new Date(fechaVal+'T12:00:00').toISOString():new Date().toISOString()
  if(tipo==='insumo'){
    const insId=document.getElementById('co-ins').value
    const cant=n('co-cant'),monto=n('co-monto')
    if(!insId){toast('error','Seleccioná o escribí un insumo');return}
    if(!cant||!monto){toast('error','Completá cantidad y monto');return}
    const ppuNuevo=Number((parseFloat(document.getElementById('co-ppu')?.value)||monto/cant).toFixed(2))
    if(insId==='__nuevo__'){
      // Crear insumo nuevo
      const nombre=document.getElementById('co-ins-search').value.trim()
      if(!nombre){toast('error','Escribí el nombre del insumo');return}
      const tipoIns=document.getElementById('co-nuevo-tipo')?.value||'insumo'
      const {data:nuevo,error:errIns}=await sb.from('insumos').insert({nombre,tipo:tipoIns,stock:cant,stock_minimo:cant,ppu:ppuNuevo,precio_compra:monto,activo:true}).select().single()
      if(errIns){toast('error','Error al crear insumo: '+errIns.message);return}
      await sb.from('compras').insert({tipo,insumo_id:nuevo.id,cantidad:cant,ppu_anterior:0,ppu_nuevo:ppuNuevo,monto_total:monto,metodo_pago:met,proveedor:prov,created_at:fecha})
      cacheInvalidate('insumos')
      toast('success','Insumo "'+nombre+'" creado · PPG/U: $'+ppuNuevo.toFixed(2)+' ✅')
    }else{
      // Actualizar insumo existente
      const ins=window._insumosCompra.find(i=>i.id===insId)
      const stockAct=ins?.stock||0,ppuAnt=ins?.ppu||0
      await sb.from('insumos').update({stock:stockAct+cant,ppu:ppuNuevo,stock_minimo:cant,precio_compra:monto}).eq('id',insId)
      await sb.from('compras').insert({tipo,insumo_id:insId,cantidad:cant,ppu_anterior:ppuAnt,ppu_nuevo:ppuNuevo,monto_total:monto,metodo_pago:met,proveedor:prov,created_at:fecha})
      cacheInvalidate('insumos')
      toast('success','Stock actualizado · PPG/U: $'+ppuNuevo.toFixed(2)+' ✅')
    }
  }else{
    const monto=n('co-monto-otro');if(!monto){toast('error','Ingresá el monto');return}
    await sb.from('compras').insert({tipo,categoria_otro:v('co-cat'),descripcion:v('co-desc'),monto_total:monto,metodo_pago:met,proveedor:prov,created_at:fecha})
    toast('success','Gasto registrado ✅')
  }
  cerrarModal();renderCompras()
}

window.addItemVenta=function(prods,ins){
  const sel=document.getElementById('vt-item')
  const opt=sel.options[sel.selectedIndex]
  if(!opt?.value){toast('error','Seleccioná un item');return}
  const cant=parseFloat(document.getElementById('vt-cant').value)||1
  const precioInput=parseFloat(document.getElementById('vt-precio').value)
  const precioSug=parseFloat(opt.dataset.sug)||0
  const precioUnit=precioInput||parseFloat(opt.dataset.precio)||0
  const tipo=document.getElementById('vt-tipo').value
  // Si ya existe el mismo item al mismo precio, sumar cantidad
  const existe=window._vitems.find(i=>i.id===opt.value&&i.precio_unitario===precioUnit)

}

window.cambiarCantItem=function(idx,delta){
  const i=window._vitems[idx]
  if(!i)return
  i.cant=Math.max(1,i.cant+delta)

  i.diferencia=(i.precio_unitario-i.precio_sugerido)*i.cant
  renderItemsVenta()
}
window.cerrarVenta=async function(){
  const items=window._vitems;if(!items.length){toast('error','Agrega al menos un item');return}
  const total=items.reduce((a,i)=>a+i.subtotal,0)
  const est=document.getElementById('vt-est').value
  const mpagado=est==='pagado'?total:est==='parcial'?n('vt-mpagado'):0
  const fechaVal=document.getElementById('vt-fecha')?.value
  const fechaVenta=fechaVal?new Date(fechaVal+'T12:00:00').toISOString():new Date().toISOString()
  const cliId=document.getElementById('vt-cli').value||null,cliLibre=v('vt-cli-libre')
  const {data:vt,error}=await sb.from('ventas').insert({cliente_id:cliId,cliente_libre:!cliId?(cliLibre||'Consumidor Final'):null,total,subtotal:total,metodo_pago:document.getElementById('vt-met').value,estado_pago:est,monto_pagado:mpagado,saldo_pendiente:total-mpagado,notas:v('vt-notas'),created_at:fechaVenta}).select().single()
  if(error){toast('error','Error al guardar venta');return}
  // Para cada ítem de tipo producto, traer el desglose de costos guardado en el producto
  const itemsRows=[]
  for(const i of items){
    let costoBase=0,moMonto=0,gananciaMonto=0,envasadoMonto=0,envaseCosto=0,etiquetaCosto=0,otrosCosto=0
    if(i.tipo==='producto'){
      const {data:p}=await sb.from('productos').select('costo,mo_pct,ganancia_pct,envasado_pct,insumos!envase_id(ppu),insumos_etiqueta:insumos!etiqueta_id(ppu),insumos_otro1:insumos!otro1_id(ppu),insumos_otro2:insumos!otro2_id(ppu),insumos_otro3:insumos!otro3_id(ppu)').eq('id',i.id).single()
      if(p){
        costoBase=Number(p.costo||0)*i.cant
        moMonto=costoBase*(Number(p.mo_pct||0)/100)
        gananciaMonto=costoBase*(Number(p.ganancia_pct||0)/100)
        const baseEnv=costoBase+moMonto+gananciaMonto
        envasadoMonto=baseEnv*(Number(p.envasado_pct||0)/100)
        envaseCosto=Number(p.insumos?.ppu||0)*i.cant
        etiquetaCosto=Number(p.insumos_etiqueta?.ppu||0)*i.cant
        otrosCosto=(Number(p.insumos_otro1?.ppu||0)+Number(p.insumos_otro2?.ppu||0)+Number(p.insumos_otro3?.ppu||0))*i.cant
      }
    }
    itemsRows.push({venta_id:vt.id,tipo:i.tipo,producto_id:i.tipo==='producto'?i.id:null,insumo_id:i.tipo==='insumo'?i.id:null,nombre_item:i.nombre,cantidad:i.cant,precio_sugerido:i.precio_sugerido,precio_unitario:i.precio_unitario,subtotal:i.subtotal,diferencia:i.diferencia,costo_base:costoBase,mo_monto:moMonto,ganancia_monto:gananciaMonto,envasado_monto:envasadoMonto,envase_costo:envaseCosto,etiqueta_costo:etiquetaCosto,otros_costo:otrosCosto})
  }
  await sb.from('venta_items').insert(itemsRows)
  for(const i of items){if(i.tipo==='producto'){const {data:p}=await sb.from('productos').select('stock').eq('id',i.id).single();await sb.from('productos').update({stock:Math.max(0,p.stock-i.cant)}).eq('id',i.id)}else{const {data:ins}=await sb.from('insumos').select('stock,stock_minimo,ppu').eq('id',i.id).single();if(!esIlimitado(ins))await sb.from('insumos').update({stock:Math.max(0,ins.stock-i.cant)}).eq('id',i.id)}}
  toast('success','Venta #'+String(vt.numero).padStart(4,'0')+' — $'+total.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})+' ✅')
  cerrarModal();setTimeout(()=>modalComprobante(vt.id),300)
}
window.modalComprobante=async function(id){

    <div class="card" style="margin-bottom:14px">
      <div class="list-item" style="cursor:default"><span style="color:var(--label)">Cliente</span><strong>${cli}</strong></div>
      <div class="list-item" style="cursor:default"><span style="color:var(--label)">Fecha</span><span>${fecha}</span></div>
      <div class="list-item" style="cursor:default"><span style="color:var(--label)">Pago</span><span>${vt.metodo_pago} · <span class="badge badge-${anulada?'gray':vt.estado_pago==='pagado'?'green':vt.estado_pago==='parcial'?'warn':'danger'}">${vt.estado_pago}</span></span></div>
      ${items.map(i=>'<div class="list-item" style="cursor:default"><span>'+i.nombre_item+' x'+i.cantidad+'</span><strong>$'+Number(i.subtotal).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})+'</strong></div>').join('')}
      <div class="list-item" style="cursor:default;border-top:1px solid var(--border)"><strong>Total</strong><strong style="color:var(--accent2);font-size:18px">$${Number(vt.total).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}</strong></div>
      ${vt.saldo_pendiente>0?'<div class="list-item" style="cursor:default"><span style="color:var(--danger)">Saldo pendiente</span><strong style="color:var(--danger)">$'+Number(vt.saldo_pendiente).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})+'</strong></div>':''}
    </div>
    <button class="btn btn-success" style="width:100%;margin-bottom:8px" onclick="generarComprobantePDF('${id}')">📄 Descargar / Compartir PDF</button>
    ${!anulada?`
    <div class="btn-row" style="margin-top:8px">
      <button class="btn btn-ghost" style="flex:1" onclick="modalModificarVenta('${id}')">✏️ Modificar</button>
      <button class="btn btn-danger" style="flex:1" onclick="modalAnularVenta('${id}')">🚫 Anular venta</button>
    </div>`:''}`)
  window._comprobanteData={vt,items,cli,fecha,num}
}

window.generarComprobantePDF=async function(id){
  const {vt,items,cli,fecha,num}=window._comprobanteData
  const {jsPDF}=window.jspdf
  const W=110
  const altoBase=145
  const altoItems=items.length*12
  const altoExtra=(vt.saldo_pendiente>0?14:0)+(vt.notas?10:0)
  const H=altoBase+altoItems+altoExtra
  const doc=new jsPDF({unit:'mm',format:[W,H],orientation:'portrait'})
  const M=6

  const NEGRO=[0,0,0],GRIS=[110,110,110],ROJO=[180,0,0]

  // Columnas: CANT|DESCRIPCIÓN|P.UNIT|TOTAL
  const cCant=M         // x=6
  const cDesc=M+10      // x=16
  const cPunit=M+62     // x=68
  const cTotal=W-M      // x=104 (align right)

  function lineaPunteada(y){doc.setDrawColor(...GRIS);doc.setLineWidth(0.2);doc.setLineDash([1,1],0);doc.line(M,y,W-M,y);doc.setLineDash([],0)}
  function lineaSolida(y,g=0.3){doc.setDrawColor(...NEGRO);doc.setLineWidth(g);doc.line(M,y,W-M,y)}

  doc.setFillColor(255,255,255);doc.rect(0,0,W,H,'F')

  let y=6

  // ── Leyenda superior ──
  doc.setFontSize(6).setFont('helvetica','bold').setTextColor(...GRIS)
  doc.text('COMPROBANTE NO VÁLIDO COMO FACTURA',W/2,y,{align:'center'});y+=6
  lineaPunteada(y);y+=6

  // ── Cabecera ──
  doc.setFontSize(12).setFont('helvetica','bold').setTextColor(...NEGRO)
  doc.text('QuimArts',W/2,y,{align:'center'});y+=5
  doc.setFontSize(8).setFont('helvetica','normal').setTextColor(...GRIS)
  doc.text('Productos de limpieza',W/2,y,{align:'center'});y+=8

  lineaPunteada(y);y+=5

  // ── Número y fecha ──
  doc.setFontSize(9).setFont('helvetica','bold').setTextColor(...NEGRO)
  doc.text('COMPROBANTE #'+num,M,y)
  doc.setFontSize(8).setFont('helvetica','normal').setTextColor(...GRIS)
  doc.text(fecha,W-M,y,{align:'right'});y+=5
  const hora=new Date(vt.created_at).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})
  doc.setFontSize(7).text('Hora: '+hora,M,y);y+=7

  lineaPunteada(y);y+=5

  // ── Cliente ──
  doc.setFontSize(8).setFont('helvetica','bold').setTextColor(...NEGRO)
  doc.text('Cliente:',M,y)
  doc.setFont('helvetica','normal')
  doc.text(cli,M+16,y);y+=5
  const cd=vt.clientes
  if(cd){
    doc.setFontSize(7).setTextColor(...GRIS)
    if(cd.dni){doc.text('DNI: '+cd.dni,M,y);y+=4}
    if(cd.telefono){doc.text('Tel: '+cd.telefono,M,y);y+=4}
    if(cd.direccion){doc.text(cd.direccion,M,y);y+=4}
  }
  y+=3

  lineaPunteada(y);y+=4

  // ── Header columnas ──
  doc.setFontSize(7).setFont('helvetica','bold').setTextColor(...GRIS)
  doc.text('CANT',cCant,y)
  doc.text('DESCRIPCIÓN',cDesc,y)
  doc.text('P.UNIT',cPunit,y)
  doc.text('SUBTOTAL',cTotal,y,{align:'right'})
  y+=3
  lineaSolida(y,0.2);y+=4

  // ── Items ──
  items.forEach(it=>{
    const nom=it.nombre_item.length>24?it.nombre_item.substring(0,22)+'..':it.nombre_item
    doc.setFontSize(8).setFont('helvetica','normal').setTextColor(...NEGRO)
    doc.text(String(it.cantidad),cCant,y)
    doc.setFont('helvetica','bold')
    doc.text(nom,cDesc,y)
    doc.setFont('helvetica','normal')
    doc.text('$'+Number(it.precio_unitario).toFixed(2),cPunit,y)
    doc.setFont('helvetica','bold')
    doc.text('$'+Number(it.subtotal).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}),cTotal,y,{align:'right'})
    y+=9
  })

  lineaSolida(y,0.5);y+=2
  lineaSolida(y,0.2);y+=6

  // ── Total ──
  doc.setFontSize(12).setFont('helvetica','bold').setTextColor(...NEGRO)
  doc.text('TOTAL',M,y)
  doc.text('$'+Number(vt.total).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}),W-M,y,{align:'right'});y+=9

  lineaSolida(y,0.2);y+=6

  // ── Pago ──
  doc.setFontSize(8).setFont('helvetica','normal').setTextColor(...NEGRO)
  doc.text(vt.metodo_pago,M,y)
  doc.text('$'+Number(vt.monto_pagado||vt.total).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}),W-M,y,{align:'right'});y+=6
  doc.setFont('helvetica','bold')
  doc.text('Estado: '+vt.estado_pago.toUpperCase(),M,y);y+=7

  if(vt.saldo_pendiente>0){
    doc.setTextColor(...ROJO).setFontSize(9)
    doc.text('Saldo pendiente:',M,y)
    doc.text('$'+Number(vt.saldo_pendiente).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}),W-M,y,{align:'right'});y+=8
    doc.setTextColor(...NEGRO)
  }

  if(vt.notas){
    lineaPunteada(y);y+=4
    doc.setFontSize(7).setFont('helvetica','italic').setTextColor(...GRIS)
    doc.text('Nota: '+vt.notas,M,y);y+=7
  }

  lineaPunteada(y);y+=5

  // ── Footer ──
  doc.setFontSize(7).setFont('helvetica','italic').setTextColor(...GRIS)
  doc.text('Muchas gracias por su compra',W/2,y,{align:'center'});y+=4
  doc.text('QuimArts · Productos de limpieza',W/2,y,{align:'center'});y+=6

  lineaPunteada(y);y+=5

  // ── Leyenda inferior ──
  doc.setFontSize(6).setFont('helvetica','bold').setTextColor(...GRIS)
  doc.text('COMPROBANTE NO VÁLIDO COMO FACTURA',W/2,y,{align:'center'})

  doc.save('comprobante-'+num+'.pdf')
  toast('success','PDF listo para compartir ✅')
}

window.generarReporte=async function(){
  const desde=document.getElementById('rep-desde').value
  const hasta=document.getElementById('rep-hasta').value
  if(!desde||!hasta){toast('error','Seleccioná ambas fechas');return}
  const desdeISO=new Date(desde+'T00:00:00').toISOString()
  const hastaISO=new Date(hasta+'T23:59:59').toISOString()
  document.getElementById('rep-resultado').innerHTML='<div class="loading">Cargando datos...</div>'

  // Traer todo en paralelo
  const [{data:ventas},{data:compras},{data:anulVentas},{data:anulCompras}]=await Promise.all([
    sb.from('ventas').select('*,clientes(nombre,apellido),venta_items(*)').gte('created_at',desdeISO).lte('created_at',hastaISO).neq('estado_pago','anulada').order('created_at'),
    sb.from('compras').select('*,insumos(nombre)').gte('created_at',desdeISO).lte('created_at',hastaISO).eq('estado','activa').order('created_at'),
    sb.from('ventas').select('*,clientes(nombre,apellido),venta_items(*)').gte('created_at',desdeISO).lte('created_at',hastaISO).eq('estado_pago','anulada').order('created_at'),
    sb.from('compras').select('*,insumos(nombre)').gte('created_at',desdeISO).lte('created_at',hastaISO).eq('estado','anulada').order('created_at')
  ])

  // Traer modificaciones de ventas del período
  const {data:audModif}=await sb.from('auditoria').select('*').eq('tipo','modificacion_venta').gte('created_at',desdeISO).lte('created_at',hastaISO).order('created_at')

  window._reporteData={ventas:ventas||[],compras:compras||[],anulVentas:anulVentas||[],anulCompras:anulCompras||[],audModif:audModif||[],desde,hasta}

  // Calcular totales de ventas
  let sumCosto=0,sumMO=0,sumGanancia=0,sumEnvasado=0,sumEnvase=0,sumEtiqueta=0,sumOtros=0,sumSugerido=0,sumVenta=0,sumDif=0,sumPagado=0,sumPendiente=0
  const ventasFlat=[]
  ;(ventas||[]).forEach(vt=>{
    const cli=vt.clientes?vt.clientes.nombre+' '+(vt.clientes.apellido||''):(vt.cliente_libre||'Consumidor Final')
    const fecha=new Date(vt.created_at).toLocaleDateString('es-AR')
    ;(vt.venta_items||[]).forEach(it=>{
      const costo=Number(it.costo_base||0)
      const mo=Number(it.mo_monto||0)
      const gan=Number(it.ganancia_monto||0)
      const env=Number(it.envasado_monto||0)
      const envase=Number(it.envase_costo||0)
      const etiq=Number(it.etiqueta_costo||0)
      const otros=Number(it.otros_costo||0)
      const sug=Number(it.precio_sugerido||0)*Number(it.cantidad||1)
      const venta=Number(it.subtotal||0)
      const dif=venta-sug
      sumCosto+=costo;sumMO+=mo;sumGanancia+=gan;sumEnvasado+=env
      sumEnvase+=envase;sumEtiqueta+=etiq;sumOtros+=otros
      sumSugerido+=sug;sumVenta+=venta;sumDif+=dif
      ventasFlat.push({fecha,cli,estado:vt.estado_pago,pagado:vt.monto_pagado||vt.total,pendiente:vt.saldo_pendiente||0,item:it.nombre_item,cant:it.cantidad,costo,mo,gan,env,envase,etiq,otros,sug,venta,dif})
    })
    sumPagado+=Number(vt.monto_pagado||vt.total||0)
    sumPendiente+=Number(vt.saldo_pendiente||0)
  })

  // Subtotales
  const subCostos=sumCosto+sumEnvase+sumEtiqueta+sumOtros
  const subGanancias=sumMO+sumGanancia+sumEnvasado+sumDif
  const subGeneral=subCostos+subGanancias
  const subIngreso=subGeneral-sumPendiente

  // Totales compras
  const sumCompras=(compras||[]).reduce((a,c)=>a+Number(c.monto_total||0),0)

  // Balance
  const balance=sumVenta-sumCompras

  // Renderizar resultado en pantalla (resumen)
  document.getElementById('rep-resultado').innerHTML=`
    <div class="card" style="margin-bottom:12px">
      <div class="section-title">Resumen del período ${desde.split('-').reverse().join('/')} al ${hasta.split('-').reverse().join('/')}</div>
      <div class="list-item" style="cursor:default"><span>Total ventas</span><strong style="color:var(--accent2)">$${sumVenta.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}</strong></div>
      <div class="list-item" style="cursor:default"><span>Total compras</span><strong style="color:var(--danger)">$${sumCompras.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}</strong></div>
      <div class="list-item" style="cursor:default;border-top:1px solid var(--border)"><strong>Balance</strong><strong style="color:${balance>=0?'var(--accent2)':'var(--danger)'};font-size:18px">$${balance.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}</strong></div>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div class="list-item" style="cursor:default"><span style="color:var(--muted)">Ventas (${ventasFlat.length} ítems)</span><span>${(ventas||[]).length} ventas</span></div>
      <div class="list-item" style="cursor:default"><span style="color:var(--muted)">Cobrado</span><span>$${sumPagado.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
      <div class="list-item" style="cursor:default"><span style="color:var(--muted)">Pendiente de cobro</span><span style="color:var(--danger)">$${sumPendiente.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
      <div class="list-item" style="cursor:default"><span style="color:var(--muted)">Compras del período</span><span>${(compras||[]).length} compras</span></div>
      <div class="list-item" style="cursor:default"><span style="color:var(--muted)">Ventas anuladas</span><span>${(anulVentas||[]).length}</span></div>
      <div class="list-item" style="cursor:default"><span style="color:var(--muted)">Compras anuladas</span><span>${(anulCompras||[]).length}</span></div>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="generarReportePDF()">📄 Descargar reporte PDF completo</button>`
}

window.generarReportePDF=async function(){
  const {ventas,compras,anulVentas,anulCompras,audModif,desde,hasta}=window._reporteData
  if(!ventas){toast('error','Generá el reporte primero');return}
  toast('info','Generando PDF...')
  const {jsPDF}=window.jspdf
  const doc=new jsPDF({unit:'mm',format:'a4',orientation:'landscape'})
  const W=297,H=210,M=10
  const NEGRO=[0,0,0],GRIS=[100,100,100],GRIS_CLARO=[200,200,200],FONDO_HEADER=[230,230,230],FONDO_GRUPO=[245,245,245],ROJO=[180,0,0],VERDE=[0,120,60]

  let pag=1
  function nuevaPagina(titulo=''){
    if(pag>1)doc.addPage()
    doc.setFillColor(255,255,255);doc.rect(0,0,W,H,'F')
    // Header de página
    doc.setFillColor(...FONDO_HEADER);doc.rect(0,0,W,14,'F')
    doc.setFontSize(9).setFont('helvetica','bold').setTextColor(...NEGRO)
    doc.text('QuimArts — Reporte General',M,9)
    doc.setFont('helvetica','normal').setTextColor(...GRIS)
    doc.text('Período: '+desde.split('-').reverse().join('/')+' al '+hasta.split('-').reverse().join('/'),M+70,9)
    if(titulo)doc.text(titulo,W/2,9,{align:'center'})
    doc.text('Pág. '+pag,W-M,9,{align:'right'})
    doc.setDrawColor(...GRIS_CLARO);doc.setLineWidth(0.3);doc.line(0,14,W,14)
    pag++;return 20
  }

  function fmtM(n){return'$'+(Number(n)||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}
  function fmtF(iso){return iso?new Date(iso).toLocaleDateString('es-AR'):'—'}
  function txt(t,maxW){if(!t)return'';const s=String(t);return doc.getTextWidth(s)>maxW?s.substring(0,Math.floor(maxW/doc.getTextWidth(s)*s.length)-2)+'..':s}

  // ── ENCABEZADO DE TABLA ───────────────────────────────────
  function drawTableHeader(y,cols){
    doc.setFillColor(...FONDO_HEADER);doc.rect(M,y,W-M*2,6,'F')
    doc.setFontSize(6).setFont('helvetica','bold').setTextColor(...NEGRO)
    cols.forEach(c=>{
      if(c.align==='right')doc.text(c.label,c.x+c.w,y+4,{align:'right'})
      else doc.text(c.label,c.x+1,y+4)
    })
    return y+7
  }
  function drawRow(y,cols,data,fondo){
    if(fondo){doc.setFillColor(...fondo);doc.rect(M,y,W-M*2,6,'F')}
    doc.setFontSize(6).setFont('helvetica','normal').setTextColor(...NEGRO)
    cols.forEach((c,i)=>{
      const val=data[i]===undefined||data[i]===null?'':String(data[i])
      if(c.align==='right')doc.text(txt(val,c.w-1),c.x+c.w,y+4,{align:'right'})
      else doc.text(txt(val,c.w-2),c.x+1,y+4)
    })
    doc.setDrawColor(...GRIS_CLARO);doc.setLineWidth(0.1);doc.line(M,y+6,W-M,y+6)
    return y+6
  }
  function drawTotalRow(y,cols,data){
    doc.setFillColor(...FONDO_HEADER);doc.rect(M,y,W-M*2,7,'F')
    doc.setFontSize(6.5).setFont('helvetica','bold').setTextColor(...NEGRO)
    cols.forEach((c,i)=>{

  }

  let y=nuevaPagina('REPORTE DE VENTAS')

  y=drawTableHeader(y,colsV)

  let sumCosto=0,sumMO=0,sumGan=0,sumEnv=0,sumEnvase=0,sumEtiq=0,sumOtros=0,sumSug=0,sumVenta=0,sumPag=0,sumPend=0

  let ventaAnteriorId=null
  ;(ventas||[]).forEach(vt=>{

    ;(vt.venta_items||[]).forEach((it,itIdx)=>{

      const costo=Number(it.costo_base||0);const mo=Number(it.mo_monto||0);const gan=Number(it.ganancia_monto||0)

      sumCosto+=costo;sumMO+=mo;sumGan+=gan;sumEnv+=envasado;sumEnvase+=envase;sumEtiq+=etiq;sumOtros+=otros;sumSug+=sug;sumVenta+=venta

  // SECCIÓN 2: REPORTE DE COMPRAS
  // ════════════════════════════════════════════════════════
  y+=6

  ;(compras||[]).forEach(c=>{

  y=drawTotalRow(y,colsC,['TOTAL COMPRAS','','','','','','',fmtM(sumCompras),''])
  y+=6

  // Balance final
  const balance=sumVenta-sumCompras
  if(y>175)y=nuevaPagina('BALANCE FINAL')

  y+=18

  // ════════════════════════════════════════════════════════
  // SECCIÓN 3: ANULACIONES Y MODIFICACIONES

  if(tieneAnul){

    if(y>170)y=nuevaPagina('ANULACIONES Y MODIFICACIONES')

        y=drawRow(y,colsAV,[fmtF(vt.created_at),'#'+String(vt.numero).padStart(4,'0'),txt(cli,39),fmtM(vt.total),fmtF(vt.anulada_at),txt(vt.motivo_anulacion||'—',W-M*2-129)])

window.generarCatalogoPDF = async function() {
  toast('info', 'Generando catálogo...')
  let prods = cacheGet('productos')
  if (!prods) {
    const r = await sb.from('productos').select('id,nombre,precio_venta').eq('activo', true).order('nombre')
    prods = r.data || []
  }
  if (!prods.length) { toast('warn', 'No hay productos cargados'); return }

  // Cargar variedades de todos los productos que las tengan
  const ids = prods.map(p => p.id)
  const { data: variedades } = await sb.from('producto_variedades').select('producto_id,nombre,stock').in('producto_id', ids).order('nombre')
  const varMap = {}
  variedades?.forEach(v => { if (!varMap[v.producto_id]) varMap[v.producto_id] = []; varMap[v.producto_id].push(v) })

  const { jsPDF } = window.jspdf
  const doc = new jsPDF({ unit: 'mm', format: 'a4' })
  const W = 210, M = 18, colW = (W - M * 2)

  // ── Paleta de colores ──
  const VERDE  = [0, 200, 150]
  const OSCURO = [15, 17, 23]
  const GRIS   = [55, 60, 75]
  const BORDE  = [40, 45, 58]
  const TEXTO  = [220, 225, 235]
  const PRECIO = [80, 220, 170]

  let y = 0

  function nuevaPagina() {
    if (y > 0) doc.addPage()
    // Fondo oscuro
    doc.setFillColor(...OSCURO)
    doc.rect(0, 0, W, 297, 'F')
    // Header
    doc.setFillColor(...GRIS)
    doc.rect(0, 0, W, 22, 'F')
    // Logo QuimArts
    doc.setFontSize(14).setFont('helvetica','bold').setTextColor(...VERDE)
    doc.text('Quim', M, 14)
    const wQuim = doc.getTextWidth('Quim')
    doc.setTextColor(...PRECIO)
    doc.text('Arts', M + wQuim, 14)
    // Título
    doc.setFontSize(11).setFont('helvetica','normal').setTextColor(...TEXTO)
    doc.text('Lista de precios', W / 2, 14, { align: 'center' })
    // Fecha
    const fecha = new Date().toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' })
    doc.setFontSize(9).setTextColor(...GRIS)
    doc.text(fecha, W - M, 14, { align: 'right' })
    y = 32
  }

  nuevaPagina()

  prods.forEach((p, idx) => {
    const vars = varMap[p.id] || []
    const alturaFila = vars.length > 0 ? 10 + vars.length * 6 : 12

    if (y + alturaFila > 280) nuevaPagina()

    // Fondo de fila alternado
    if (idx % 2 === 0) {
      doc.setFillColor(25, 28, 38)
      doc.roundedRect(M, y - 5, colW, alturaFila, 2, 2, 'F')
    }

    // Nombre del producto
    doc.setFontSize(11).setFont('helvetica', 'bold').setTextColor(...TEXTO)
    doc.text(p.nombre, M + 4, y + 1)

    if (vars.length === 0) {
      // Sin variedades: precio a la derecha
      doc.setFontSize(11).setFont('helvetica', 'bold').setTextColor(...PRECIO)
      doc.text('$' + Number(p.precio_venta).toFixed(2), W - M - 4, y + 1, { align: 'right' })
      y += alturaFila
    } else {
      // Con variedades: precio del padre + lista de variedades
      doc.setFontSize(10).setFont('helvetica', 'normal').setTextColor(...PRECIO)
      doc.text('$' + Number(p.precio_venta).toFixed(2), W - M - 4, y + 1, { align: 'right' })
      y += 7
      vars.forEach(v => {
        doc.setFontSize(9).setFont('helvetica', 'normal').setTextColor(...GRIS)
        doc.text('  · ' + v.nombre, M + 6, y)
        y += 6
      })
      y += 3
    }

    // Línea separadora sutil
    doc.setDrawColor(...BORDE)
    doc.setLineWidth(0.2)
    doc.line(M, y, W - M, y)
    y += 4
  })

  // Footer en última página
  doc.setFontSize(8).setFont('helvetica', 'italic').setTextColor(...GRIS)
  doc.text('QuimArts · Productos de limpieza', W / 2, 290, { align: 'center' })

  doc.save('catalogo-quimarts.pdf')
  toast('success', 'Catálogo descargado ✅')
}

window.modalAnularVenta=function(id){
  if(isSuperUser()){
    modalAccionSuperUser({
      titulo:'⚡ Venta — acción rápida',
      onAnular:async function(){
        const [{data:vt},{data:items}]=await Promise.all([
          sb.from('ventas').select('*').eq('id',id).single(),
          sb.from('venta_items').select('*').eq('venta_id',id)
        ])
        if(vt.estado_pago==='anulada'){toast('warn','Ya está anulada');return}
        for(const i of items){
          if(i.tipo==='producto'&&i.producto_id){
            const {data:p}=await sb.from('productos').select('stock').eq('id',i.producto_id).single()
            if(p)await sb.from('productos').update({stock:p.stock+i.cantidad}).eq('id',i.producto_id)
          }else if(i.tipo==='insumo'&&i.insumo_id){
            const {data:ins}=await sb.from('insumos').select('stock,stock_minimo,ppu').eq('id',i.insumo_id).single()
            if(ins&&!esIlimitado(ins))await sb.from('insumos').update({stock:ins.stock+i.cantidad}).eq('id',i.insumo_id)
          }
        }
        await sb.from('ventas').update({estado_pago:'anulada',motivo_anulacion:'Súper usuario',anulada_at:new Date().toISOString(),saldo_pendiente:0}).eq('id',id)
        await sb.from('auditoria').insert({tipo:'anulacion_venta',referencia_id:id,descripcion:'Venta anulada · stock restaurado',motivo:'Súper usuario'})
        cacheInvalidate('productos');cacheInvalidate('insumos');cacheInvalidate('ventas')
        toast('success','Venta anulada · stock restaurado ✅')
        cerrarModal();renderVentas()
      },
      onEliminar:async function(){
        await sb.from('venta_items').delete().eq('venta_id',id)
        await sb.from('ventas').delete().eq('id',id)

window.guardarModificacionVenta=async function(ventaId,motivo){
  const items=window._itemsModificar
  let nuevoTotal=0
  for(let idx=0;idx<items.length;idx++){
    const i=items[idx]
    const nuevaCant=parseFloat(document.getElementById(`mod-cant-${idx}`)?.value)||0
    const diff=nuevaCant-i.cantidad
    if(i.tipo==='producto'&&i.producto_id){
      const {data:p}=await sb.from('productos').select('stock').eq('id',i.producto_id).single()
      if(p)await sb.from('productos').update({stock:Math.max(0,p.stock-diff)}).eq('id',i.producto_id)
    }else if(i.tipo==='insumo'&&i.insumo_id){
      const {data:ins}=await sb.from('insumos').select('stock,stock_minimo,ppu').eq('id',i.insumo_id).single()
      if(ins&&!esIlimitado(ins))await sb.from('insumos').update({stock:Math.max(0,ins.stock-diff)}).eq('id',i.insumo_id)
    }
    const nuevoSub=nuevaCant*i.precio_unitario
    await sb.from('venta_items').update({cantidad:nuevaCant,subtotal:nuevoSub}).eq('id',i.id)
    nuevoTotal+=nuevoSub
  }
  const {data:vtActual}=await sb.from('ventas').select('notas').eq('id',ventaId).single()
  const notasNuevas=(vtActual?.notas||'')+' | Mod: '+motivo
  await sb.from('ventas').update({total:nuevoTotal,subtotal:nuevoTotal,notas:notasNuevas}).eq('id',ventaId)
  await sb.from('auditoria').insert({tipo:'modificacion_venta',referencia_id:ventaId,descripcion:'Venta modificada',motivo})
  toast('success','Venta modificada · stock ajustado ✅')
  cerrarModal();renderVentas()
}

// ── WEBAUTHN / HUELLA ────────────────────────────────────
const WA_KEY = 'qa_webauthn_cred'

function webAuthnDisponible() {
  return window.PublicKeyCredential && location.protocol === 'https:' || location.hostname === 'localhost'
}

function credGuardada() {
  return !!localStorage.getItem(WA_KEY)
}

// Registrar huella en este dispositivo
async function registrarHuella() {
  if (!webAuthnDisponible()) { toast('warn', 'Tu navegador no soporta biometría'); return false }
  try {
    const challenge = new Uint8Array(32)
    crypto.getRandomValues(challenge)
    const cred = await navigator.credentials.create({
      publicKey: {
        challenge,
        rp: { name: 'QuimArts', id: location.hostname },
        user: { id: new Uint8Array([1]), name: 'admin', displayName: 'Administrador' },
        pubKeyCredParams: [{ type: 'public-key', alg: -7 }, { type: 'public-key', alg: -257 }],
        authenticatorSelection: { userVerification: 'required', residentKey: 'preferred' },
        timeout: 60000
      }
    })
    if (!cred) return false
    // Guardamos solo el rawId como identificador
    const rawIdB64 = btoa(String.fromCharCode(...new Uint8Array(cred.rawId)))
    localStorage.setItem(WA_KEY, JSON.stringify({ rawId: rawIdB64, id: cred.id }))
    return true
  } catch(e) {
    if (e.name !== 'NotAllowedError') console.error('WebAuthn register:', e)
    return false
  }
}

// Verificar huella
async function verificarHuella() {
  if (!webAuthnDisponible() || !credGuardada()) return false
  try {
    const stored = JSON.parse(localStorage.getItem(WA_KEY))
    const challenge = new Uint8Array(32)
    crypto.getRandomValues(challenge)
    const rawId = Uint8Array.from(atob(stored.rawId), c => c.charCodeAt(0))
    const assertion = await navigator.credentials.get({
      publicKey: {
        challenge,
        allowCredentials: [{ type: 'public-key', id: rawId }],
        userVerification: 'required',
        timeout: 60000
      }
    })
    return !!assertion
  } catch(e) {
    return false
  }
}

// Pide contraseña O huella. onSuccess(motivo) se llama si pasa
window.pedirAuth = function({ titulo, descripcion, conMotivo = false, etiquetaMotivo = 'Motivo', onSuccess }) {
  const tieneHuella = credGuardada() && webAuthnDisponible()
  abrirModal(`
    <button class="modal-close" onclick="cerrarModal()">✕</button>
    <div class="modal-title">${titulo}</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px">${descripcion || ''}</div>
    ${conMotivo ? `<div class="form-group"><label class="form-label">${etiquetaMotivo} <span style="color:var(--danger)">*</span></label>
      <input class="form-input" id="auth-motivo" placeholder="Ingresá el motivo..." maxlength="200"></div>` : ''}
    ${tieneHuella ? `
      <button class="btn btn-primary" style="margin-bottom:10px" onclick="authConHuella()">
        👆 Usar huella / Face ID
      </button>
      <div style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:10px">— o —</div>` : ''}
    <div class="form-group"><label class="form-label">Contraseña</label>
      <input class="form-input" id="auth-pass" type="password" placeholder="Contraseña de administrador"
        onkeydown="if(event.key==='Enter')authConPass()"></div>
    <div class="btn-row">
      <button class="btn btn-ghost" style="flex:1" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-danger" style="flex:1" onclick="authConPass()">Confirmar</button>
    </div>
  `)
  window._pendingAuth = { onSuccess, conMotivo }
  setTimeout(() => document.getElementById(conMotivo ? 'auth-motivo' : 'auth-pass')?.focus(), 100)
}

window.authConPass = function() {
  const pass = document.getElementById('auth-pass')?.value
  const motivo = document.getElementById('auth-motivo')?.value?.trim()
  if (!pass) { toast('error', 'Ingresá la contraseña'); return }
  if (pass !== getPasses().admin) { toast('error', 'Contraseña incorrecta'); return }
  if (window._pendingAuth?.conMotivo && !motivo) { toast('error', 'El motivo es obligatorio'); return }
  const fn = window._pendingAuth?.onSuccess
  cerrarModal()
  if (fn) setTimeout(() => fn(motivo || ''), 150)
}

window.authConHuella = async function() {
  const motivo = document.getElementById('auth-motivo')?.value?.trim()
  if (window._pendingAuth?.conMotivo && !motivo) { toast('error', 'El motivo es obligatorio antes de usar la huella'); return }
  toast('info', 'Esperando biometría...')
  const ok = await verificarHuella()
  if (!ok) { toast('error', 'Biometría no verificada'); return }
  const fn = window._pendingAuth?.onSuccess
  cerrarModal()
  if (fn) setTimeout(() => fn(motivo || 'Verificado con biometría'), 150)
}

window.eliminarHuella = function() {
  localStorage.removeItem(WA_KEY)
  toast('warn', 'Huella eliminada de este dispositivo')
  abrirOpciones()
}

// Verificar con huella para habilitar campo de contraseña actual (tipo: 'adm' o 'su')
window.authParaCambiarPass = async function(tipo) {
  toast('info', 'Esperando biometría...')
  const ok = await verificarHuella()
  if (!ok) { toast('error', 'Biometría no verificada'); return }
  const campoId = tipo === 'su' ? 'cp-su-actual' : 'cp-adm-actual'
  const campo = document.getElementById(campoId)
  if (campo) { campo.value = '__biometria_ok__'; campo.disabled = true; campo.style.opacity = '.5' }
  toast('success', '✅ Identidad verificada con biometría')
}

window.guardarPassAdmin = async function() {
  const actual = document.getElementById('cp-adm-actual')?.value
  const p = getPasses()
  if (actual !== '__biometria_ok__' && actual !== p.admin) { toast('error', 'Contraseña actual incorrecta'); return }
  const nueva = document.getElementById('cp-adm-nueva')?.value
  const conf  = document.getElementById('cp-adm-conf')?.value
  if (!nueva) { toast('warn', 'Ingresá la nueva contraseña'); return }
  if (nueva !== conf) { toast('error', 'Las contraseñas no coinciden'); return }
  await savePasses({ admin: nueva, superuser: p.superuser })
  sessionStorage.removeItem('formulasUnlocked')
  toast('success', 'Contraseña de administrador actualizada ✅')
  cerrarModal()
}

window.guardarPassSuperUser = async function() {
  const actual = document.getElementById('cp-su-actual')?.value
  const p = getPasses()
  if (actual !== '__biometria_ok__' && actual !== p.superuser) { toast('error', 'Contraseña actual incorrecta'); return }
  const nueva = document.getElementById('cp-su-nueva')?.value
  const conf  = document.getElementById('cp-su-conf')?.value
  if (!nueva) { toast('warn', 'Ingresá la nueva contraseña'); return }
  if (nueva !== conf) { toast('error', 'Las contraseñas no coinciden'); return }
  await savePasses({ admin: p.admin, superuser: nueva })
  toast('success', 'Contraseña de Súper Usuario actualizada ✅')
  cerrarModal()
}
